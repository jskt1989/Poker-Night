  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%E2%99%A0</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<body>
  <div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:monospace;color:#a89aae">Loading…</div></div>
  <script>
    // ╔══════════════════════════════════════════════════════════════╗
    // ║  FIREBASE CONFIG — Replace with your project's values       ║
    // ╚══════════════════════════════════════════════════════════════╝
    const firebaseConfig = {
  apiKey: "AIzaSyB15URueHpFcQmdT_mJbzyilfBdHYq6Kno",
  authDomain: "poker-night-7a1a7.firebaseapp.com",
  databaseURL: "https://poker-night-7a1a7-default-rtdb.firebaseio.com",
  projectId: "poker-night-7a1a7",
  storageBucket: "poker-night-7a1a7.firebasestorage.app",
  messagingSenderId: "385328314369",
  appId: "1:385328314369:web:b6d72e77f0a17fcdeda800",
  measurementId: "G-YQPQV4761F"
};


    var db = null;
    var firebaseReady = false;
    try {
      if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        firebaseReady = true;
      }
    } catch (e) { console.error("Firebase init failed:", e); }

    // ─── Shortcuts ───
    var ce = React.createElement;
    var useState = React.useState;
    var useCallback = React.useCallback;
    var useMemo = React.useMemo;
    var useEffect = React.useEffect;
    var useRef = React.useRef;

    var BUYIN = 25, CHIPV = 100, CTD = 0.25, SFB = 25, RFB = 50;
    var TABS = ["Setup", "Buy-ins", "Settle"];
    var RID = "rishabh-banker";

    function mp(name, id, playing) {
      return {
        name: name, id: id || String(Date.now()) + String(Math.random()).slice(2, 8),
        playing: !!playing, buyins: 1, finalChips: "", straightFlushes: 0, royalFlushes: 0
      };
    }

    var DROSTER = [
      mp("Rishabh",RID,1),mp("Tejaswi","tejaswi-01",1),mp("Aman","aman-01",1),
      mp("Priya","priya-01",1),mp("Vikram","vikram-01",1),mp("Neha","neha-01",1),
      mp("Arjun","arjun-01",1),mp("Kavya","kavya-01",1),mp("Rohan","rohan-01",1),
      mp("Ananya","ananya-01",1),mp("Siddharth","siddharth-01",0),mp("Meera","meera-01",0),
      mp("Rahul","rahul-01",0),mp("Shreya","shreya-01",0),mp("Dev","dev-01",0),
      mp("Pooja","pooja-01",0),mp("Karan","karan-01",0),mp("Nisha","nisha-01",0),
      mp("Varun","varun-01",0),mp("Aisha","aisha-01",0)
    ];

    // ─── Colors & Styles ───
    var C = {
      bg:"#faf8f9",card:"#fff",border:"#e8dfe3",
      green:"#6b9e7a",greenBg:"rgba(107,158,122,0.08)",
      red:"#c25d5d",redBg:"rgba(194,93,93,0.07)",
      gold:"#a07040",goldBg:"rgba(160,112,64,0.08)",
      text:"#2d2832",td:"#6b5f72",tm:"#a89aae",
      blue:"#7e85b2",blueBg:"rgba(126,133,178,0.08)",
      ac:"#c4899a",acBg:"rgba(196,137,154,0.10)"
    };

    var cardS = {background:C.card,border:"1px solid "+C.border,borderRadius:12,padding:16,boxShadow:"0 1px 3px rgba(0,0,0,0.04)"};
    var btnB = {border:"none",borderRadius:8,cursor:"pointer",fontWeight:600,fontSize:14,padding:"8px 16px",transition:"all 0.15s"};
    var inpS = {background:"#fff",border:"1px solid "+C.border,borderRadius:8,color:C.text,padding:"10px 12px",fontSize:15,outline:"none",width:"100%",boxSizing:"border-box"};

    function badge(bg,col){return {display:"inline-block",fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:20,background:bg,color:col,letterSpacing:0.5,textTransform:"uppercase"}}
    function togSt(a){return Object.assign({},btnB,{padding:"5px 14px",fontSize:13,borderRadius:20,fontWeight:700,background:a?C.greenBg:C.bg,color:a?C.green:C.tm,border:"1.5px solid "+(a?C.green:C.border),cursor:"pointer",minWidth:52})}

    // ─── Helper: create multiple children easily ───
    function d(tag, props) {
      var children = Array.prototype.slice.call(arguments, 2);
      return ce.apply(null, [tag, props].concat(children));
    }

    // ─── Setup Banner ───
    function SetupBanner() {
      return d("div", {style:{fontFamily:"'JetBrains Mono',monospace",background:C.bg,color:C.text,minHeight:"100vh"}},
        d("div", {style:{background:"linear-gradient(135deg,#fff 0%,#faf5f7 100%)",borderBottom:"1px solid "+C.border,padding:20}},
          d("h1", {style:{margin:0,fontSize:22,fontWeight:800,letterSpacing:-0.5,background:"linear-gradient(135deg,"+C.ac+","+C.gold+")",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}, "\u2660 Poker Night")
        ),
        d("div", {style:{padding:20,maxWidth:500,margin:"40px auto"}},
          d("div", {style:cardS},
            d("div", {style:{fontSize:18,fontWeight:700,marginBottom:12}}, "\uD83D\uDD27 Firebase Setup Required"),
            d("div", {style:{fontSize:14,color:C.td,lineHeight:1.7}},
              "Open ", d("code", {style:{background:"#f5f0f2",padding:"2px 6px",borderRadius:4}}, "index.html"),
              " and replace the ", d("code", {style:{background:"#f5f0f2",padding:"2px 6px",borderRadius:4}}, "firebaseConfig"),
              " values (lines 28-34) with your Firebase project credentials. See SETUP.md for step-by-step instructions."
            )
          )
        )
      );
    }

    // ─── Main Calculator ───
    function PokerCalculator() {
      var s = useState, cb = useCallback, mm = useMemo;
      var _tab = s(0), tab = _tab[0], setTab = _tab[1];
      var _ros = s(DROSTER), roster = _ros[0], setRoster = _ros[1];
      var _ld = s(false), loaded = _ld[0], setLoaded = _ld[1];
      var _nn = s(""), newName = _nn[0], setNewName = _nn[1];
      var _hi = s(null), hostId = _hi[0], setHostId = _hi[1];
      var _si = s(null), snackId = _si[0], setSnackId = _si[1];
      var _fc = s(""), foodCost = _fc[0], setFoodCost = _fc[1];
      var _se = s(false), settled = _se[0], setSettled = _se[1];
      var _sr = s(false), showReset = _sr[0], setShowReset = _sr[1];
      var _ei = s(null), editId = _ei[0], setEditId = _ei[1];
      var _ev = s(""), editVal = _ev[0], setEditVal = _ev[1];
      var _sy = s("connecting"), sync = _sy[0], setSync = _sy[1];
      var skip = useRef(false);

      // Firebase load
      useEffect(function() {
        if (!firebaseReady) { setLoaded(true); setSync("offline"); return; }
        var ref = db.ref("roster");
        var listener = ref.on("value", function(snap) {
          var data = snap.val();
          if (data && Array.isArray(data)) {
            if (!data.some(function(p){return p.id===RID})) data.unshift({name:"Rishabh",id:RID,playing:true});
            else { var r = data.find(function(p){return p.id===RID}); if(r) r.playing=true; }
            skip.current = true;
            setRoster(function(prev) {
              return data.map(function(saved) {
                var ex = prev.find(function(p){return p.id===saved.id});
                return ex ? Object.assign({},ex,{name:saved.name,playing:saved.playing,id:saved.id}) : mp(saved.name,saved.id,saved.playing);
              });
            });
          }
          setLoaded(true); setSync("synced");
        }, function() { setLoaded(true); setSync("error"); });
        return function() { ref.off("value", listener); };
      }, []);

      // Firebase save
      useEffect(function() {
        if (!loaded || !firebaseReady) return;
        if (skip.current) { skip.current = false; return; }
        var toSave = roster.map(function(p){return {name:p.name,id:p.id,playing:p.playing}});
        setSync("saving");
        db.ref("roster").set(toSave).then(function(){setSync("synced")}).catch(function(){setSync("error")});
      }, [roster, loaded]);

      var players = mm(function(){return roster.filter(function(p){return p.playing})}, [roster]);

      var addPlayer = cb(function() {
        var t = newName.trim();
        if (!t || roster.some(function(p){return p.name.toLowerCase()===t.toLowerCase()})) return;
        setRoster(function(prev){return prev.concat([mp(t,null,true)])});
        setNewName("");
      }, [newName, roster]);

      var toggleP = cb(function(id) {
        if (id===RID) return;
        setRoster(function(prev){return prev.map(function(p){return p.id===id?Object.assign({},p,{playing:!p.playing}):p})});
        setHostId(function(prev){return prev===id?null:prev});
        setSnackId(function(prev){return prev===id?null:prev});
      }, []);

      var removeP = cb(function(id) {
        if (id===RID) return;
        setRoster(function(prev){return prev.filter(function(p){return p.id!==id})});
        if (hostId===id) setHostId(null);
        if (snackId===id) setSnackId(null);
      }, [hostId, snackId]);

      var upd = cb(function(id, f, v) {
        if (["buyins","finalChips","straightFlushes","royalFlushes"].indexOf(f)!==-1) skip.current=true;
        setRoster(function(prev){return prev.map(function(p){if(p.id===id){var o=Object.assign({},p);o[f]=v;return o}return p})});
      }, []);

      function startEdit(p){setEditId(p.id);setEditVal(p.name)}
      function saveEdit(id){
        var t=editVal.trim();
        if(t&&!roster.some(function(p){return p.id!==id&&p.name.toLowerCase()===t.toLowerCase()}))upd(id,"name",t);
        setEditId(null);setEditVal("");
      }

      var resetAll = cb(function() {
        setRoster(function(prev){return prev.map(function(p){return Object.assign({},p,{playing:p.id===RID,buyins:1,finalChips:"",straightFlushes:0,royalFlushes:0})})});
        setHostId(null);setSnackId(null);setFoodCost("");setSettled(false);setTab(0);setShowReset(false);
      }, []);

      var newSess = cb(function() {
        skip.current=true;
        setRoster(function(prev){return prev.map(function(p){return Object.assign({},p,{buyins:1,finalChips:"",straightFlushes:0,royalFlushes:0})})});
        setHostId(null);setSnackId(null);setFoodCost("");setSettled(false);setTab(0);setShowReset(false);
      }, []);

      // Settlement math
      var settlement = mm(function() {
        if (players.length<2) return null;
        var tBC=0,tFC=0;
        players.forEach(function(p){tBC+=p.buyins*CHIPV;tFC+=parseFloat(p.finalChips)||0});
        var bal=Math.abs(tBC-tFC)<0.01;
        var food=parseFloat(foodCost)||0;
        var nhc=players.filter(function(p){return p.id!==hostId}).length;
        var fs=nhc>0?food/nhc:0;

        var res=players.map(function(p){
          var tbd=p.buyins*BUYIN,cdv=(parseFloat(p.finalChips)||0)*CTD,pnl=cdv-tbd;
          var fb=0;if(p.id!==hostId)fb-=fs;if(p.id===snackId)fb+=food;
          var be=p.straightFlushes*SFB+p.royalFlushes*RFB;
          return Object.assign({},p,{tbd:tbd,cdv:cdv,pnl:pnl,fb:fb,be:be});
        });

        var tbc2=res.map(function(){return 0});
        res.forEach(function(r,i){if(r.be>0){var c=r.be/(players.length-1);res.forEach(function(_,j){if(i!==j)tbc2[j]+=c})}});

        var fin=res.map(function(r,i){
          var hrn=r.be-tbc2[i],raw=r.pnl+r.fb+hrn;
          return Object.assign({},r,{hrn:hrn,net:Math.round(raw),raw:raw});
        });

        var tP=0,tF=0,tH=0,tN=0;
        fin.forEach(function(r){tP+=r.pnl;tF+=r.fb;tH+=r.hrn;tN+=r.raw});
        var banker=fin.find(function(r){return r.id===RID});
        var bS=fin.filter(function(r){return r.id!==RID}).map(function(r){return{name:r.name,amount:r.net}}).filter(function(r){return Math.abs(r.amount)>0.005});

        return {results:fin,tBC:tBC,tFC:tFC,bal:bal,tP:tP,tF:tF,tH:tH,tN:tN,banker:banker,bS:bS};
      }, [players,hostId,snackId,foodCost]);

      var canSettle = players.length>=2 && players.every(function(p){return p.finalChips!==""}) && settlement && settlement.bal;

      var syncC={synced:"#6b9e7a",saving:"#a07040",connecting:"#7e85b2",error:"#c25d5d",offline:"#a89aae"};
      var syncL={synced:"Synced",saving:"Saving\u2026",connecting:"Connecting\u2026",error:"Sync error",offline:"Local only"};

      if (!loaded) return d("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:C.tm}},"Loading\u2026");

      // ─── Build UI ───
      var header = d("div",{style:{background:"linear-gradient(135deg,#fff 0%,#faf5f7 100%)",borderBottom:"1px solid "+C.border,padding:"20px 20px 0",position:"sticky",top:0,zIndex:10}},
        d("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}},
          d("div",null,
            d("h1",{style:{margin:0,fontSize:22,fontWeight:800,letterSpacing:-0.5,background:"linear-gradient(135deg,"+C.ac+","+C.gold+")",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},"\u2660 Poker Night"),
            d("div",{style:{fontSize:12,color:C.tm,marginTop:2}},"$1/$2 NL \xB7 $"+BUYIN+" buy-in \xB7 "+players.length+" playing / "+roster.length+" in roster")
          ),
          firebaseReady ? d("div",{style:{fontSize:11,color:syncC[sync],display:"flex",alignItems:"center"}},
            d("span",{style:{width:8,height:8,borderRadius:"50%",display:"inline-block",marginRight:6,background:syncC[sync]}}),syncL[sync]
          ) : null
        ),
        d("div",{style:{display:"flex",gap:0}},
          TABS.map(function(t,i){return d("button",{key:t,onClick:function(){setTab(i)},style:Object.assign({},btnB,{background:"transparent",color:tab===i?C.ac:C.td,borderRadius:0,borderBottom:"2px solid "+(tab===i?C.ac:"transparent"),padding:"8px 20px 12px",fontSize:14})},t)})
        )
      );

      // ─── Setup Tab ───
      function renderSetup() {
        var items = [];

        // Session controls
        items.push(d("div",{key:"ctrl"},
          d("div",{style:{display:"flex",gap:8}},
            d("button",{onClick:newSess,style:Object.assign({},btnB,{flex:1,padding:12,fontSize:14,background:C.acBg,color:C.ac,border:"1px solid "+C.ac})},"\uD83D\uDD04 New Session"),
            d("button",{onClick:function(){setShowReset(true)},style:Object.assign({},btnB,{padding:"12px 16px",fontSize:14,background:C.redBg,color:C.red,border:"1px solid transparent"})},"\uD83D\uDDD1 Full Reset")
          ),
          d("div",{style:{fontSize:11,color:C.tm,marginTop:6,lineHeight:1.5}},"New Session keeps roster & toggles, clears game data \xB7 Full Reset sets everyone to Out")
        ));

        // Add player
        items.push(d("div",{key:"add",style:cardS},
          d("div",{style:{fontSize:13,color:C.td,marginBottom:8,fontWeight:600}},"ADD TO ROSTER"),
          d("div",{style:{display:"flex",gap:8}},
            d("input",{style:inpS,placeholder:"Player name",value:newName,onChange:function(e){setNewName(e.target.value)},onKeyDown:function(e){if(e.key==="Enter")addPlayer()}}),
            d("button",{onClick:addPlayer,style:Object.assign({},btnB,{background:C.ac,color:"#fff",whiteSpace:"nowrap"})},"Add")
          ),
          d("div",{style:{fontSize:11,color:C.tm,marginTop:6}},"New players are saved permanently. Tap a name to rename.")
        ));

        // Roster
        var rosterRows = roster.map(function(p) {
          var nameEl;
          if (editId===p.id) {
            nameEl = d("input",{style:Object.assign({},inpS,{padding:"4px 8px",fontSize:14,width:"auto",flex:1}),value:editVal,onChange:function(e){setEditVal(e.target.value)},onBlur:function(){saveEdit(p.id)},onKeyDown:function(e){if(e.key==="Enter")saveEdit(p.id)},autoFocus:true});
          } else {
            nameEl = d("div",{style:{display:"flex",alignItems:"center",gap:6,cursor:"pointer"},onClick:function(){startEdit(p)},title:"Click to rename"},
              d("span",{style:{fontWeight:600,fontSize:15}},p.name),
              d("span",{style:{fontSize:12,color:C.tm,lineHeight:1}},"\u270E")
            );
          }

          var badges = [];
          if (hostId===p.id) badges.push(d("span",{key:"h",style:badge(C.blueBg,C.blue)},"Host"));
          if (snackId===p.id) badges.push(d("span",{key:"s",style:badge(C.goldBg,C.gold)},"Snacks"));
          if (RID===p.id) badges.push(d("span",{key:"b",style:badge(C.greenBg,C.green)},"Banker"));

          var btns = [
            d("button",{key:"tog",onClick:function(){toggleP(p.id)},style:togSt(p.playing),disabled:p.id===RID,title:p.id===RID?"Rishabh always plays":(p.playing?"Sit out":"Join game")},p.playing?"In":"Out")
          ];
          if (p.id!==RID) btns.push(d("button",{key:"rm",onClick:function(){removeP(p.id)},style:Object.assign({},btnB,{color:C.tm,background:"transparent",padding:"4px 6px",fontSize:12,opacity:0.5}),title:"Remove "+p.name+" permanently"},"\u2715"));

          return d("div",{key:p.id,style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 12px",background:p.playing?C.card:C.bg,borderRadius:8,gap:8,opacity:p.playing?1:0.55,border:"1px solid "+(p.playing?C.border:"transparent"),transition:"all 0.15s"}},
            d("div",{style:{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0}},nameEl,d("div",{style:{display:"flex",gap:4,flexWrap:"wrap"}},badges)),
            d("div",{style:{display:"flex",alignItems:"center",gap:6}},btns)
          );
        });

        items.push(d("div",{key:"roster",style:cardS},
          d("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
            d("div",{style:{fontSize:13,color:C.td,fontWeight:600}},"PLAYER ROSTER ("+roster.length+")"),
            d("div",{style:{fontSize:12,color:C.ac,fontWeight:600}},players.length+" playing")
          ),
          d("div",{style:{display:"flex",flexDirection:"column",gap:6}},rosterRows)
        ));

        // Roles
        if (players.length>=2) {
          var roleItems = [{l:"Host",s:"Exempt from food costs",v:hostId,fn:setHostId},{l:"Snack Provider",s:"Gets reimbursed for food",v:snackId,fn:setSnackId}];
          items.push(d("div",{key:"roles",style:cardS},
            d("div",{style:{fontSize:13,color:C.td,marginBottom:12,fontWeight:600}},"ASSIGN ROLES"),
            d("div",{style:{display:"flex",flexDirection:"column",gap:12}},
              roleItems.map(function(r){
                return d("div",{key:r.l},
                  d("div",{style:{fontSize:14,fontWeight:600,marginBottom:4}},r.l),
                  d("div",{style:{fontSize:12,color:C.tm,marginBottom:6}},r.s),
                  d("select",{style:Object.assign({},inpS,{cursor:"pointer"}),value:r.v||"",onChange:function(e){r.fn(e.target.value||null)}},
                    d("option",{value:""},"\u2014 Select \u2014"),
                    players.map(function(p){return d("option",{key:p.id,value:p.id},p.name)})
                  )
                );
              })
            )
          ));
        }

        if (players.length>=2 && hostId) {
          items.push(d("button",{key:"go",onClick:function(){setTab(1)},style:Object.assign({},btnB,{background:C.ac,color:"#fff",padding:12,fontSize:16,width:"100%"})},"Start Game \u2192"));
        }

        return d("div",{style:{display:"flex",flexDirection:"column",gap:16}},items);
      }

      // ─── Buy-ins Tab ───
      function renderBuyins() {
        var items = [];
        var totalDollars = players.reduce(function(s,p){return s+p.buyins*BUYIN},0);
        var totalBuyins = players.reduce(function(s,p){return s+p.buyins},0);
        var totalChips = players.reduce(function(s,p){return s+p.buyins*CHIPV},0);

        items.push(d("div",{key:"total",style:Object.assign({},cardS,{display:"flex",justifyContent:"space-between",alignItems:"center"})},
          d("div",null,
            d("div",{style:{fontSize:13,color:C.td,fontWeight:600}},"TOTAL IN PLAY"),
            d("div",{style:{fontSize:24,fontWeight:800,color:C.ac,marginTop:4}},"$"+totalDollars)
          ),
          d("div",{style:{textAlign:"right"}},
            d("div",{style:{fontSize:13,color:C.td}},totalBuyins+" buy-ins"),
            d("div",{style:{fontSize:13,color:C.td}},"$"+totalChips+" in chips")
          )
        ));

        players.forEach(function(p) {
          items.push(d("div",{key:p.id,style:Object.assign({},cardS,{display:"flex",alignItems:"center",justifyContent:"space-between"})},
            d("div",null,
              d("div",{style:{fontWeight:700,fontSize:15}},p.name,hostId===p.id?d("span",{style:Object.assign({},badge(C.blueBg,C.blue),{marginLeft:6})},"H"):null),
              d("div",{style:{fontSize:12,color:C.tm,marginTop:2}},"$"+p.buyins*BUYIN+" invested \xB7 $"+p.buyins*CHIPV+" chips")
            ),
            d("div",{style:{display:"flex",alignItems:"center",gap:10}},
              d("button",{onClick:function(){if(p.buyins>1)upd(p.id,"buyins",p.buyins-1)},disabled:p.buyins<=1,style:Object.assign({},btnB,{background:C.bg,color:p.buyins<=1?C.tm:C.text,border:"1px solid "+C.border,width:36,height:36,padding:0,fontSize:18,borderRadius:"50%",opacity:p.buyins<=1?0.4:1})},"\u2212"),
              d("span",{style:{fontSize:20,fontWeight:800,minWidth:24,textAlign:"center"}},p.buyins),
              d("button",{onClick:function(){upd(p.id,"buyins",p.buyins+1)},style:Object.assign({},btnB,{background:C.ac,color:"#fff",width:36,height:36,padding:0,fontSize:18,borderRadius:"50%"})},"+")
            )
          ));
        });

        items.push(d("button",{key:"next",onClick:function(){setTab(2)},style:Object.assign({},btnB,{background:C.ac,color:"#fff",padding:12,fontSize:16,width:"100%"})},"End Game & Settle \u2192"));
        return d("div",{style:{display:"flex",flexDirection:"column",gap:12}},items);
      }

      // ─── Settle Tab ───
      function renderSettle() {
        var items = [];
        var totalChipsNeeded = players.reduce(function(s,p){return s+p.buyins*CHIPV},0);

        // Chip counts
        var chipRows = players.map(function(p) {
          return d("div",{key:p.id,style:{display:"flex",alignItems:"center",gap:10}},
            d("span",{style:{width:100,fontSize:14,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},p.name),
            d("span",{style:{color:C.tm,fontSize:13}},"$"),
            d("input",{type:"number",style:Object.assign({},inpS,{flex:1,textAlign:"right"}),placeholder:"0",value:p.finalChips,onChange:function(e){upd(p.id,"finalChips",e.target.value)},min:"0",step:"0.25"}),
            d("span",{style:{fontSize:12,color:C.tm,minWidth:60,textAlign:"right"}},"= $"+((parseFloat(p.finalChips)||0)*CTD).toFixed(2))
          );
        });

        var balanceEl = settlement ? d("div",{style:{marginTop:12,padding:"10px 12px",borderRadius:8,background:settlement.bal?C.greenBg:C.redBg,display:"flex",justifyContent:"space-between",alignItems:"center"}},
          d("span",{style:{fontSize:13,color:settlement.bal?C.green:C.red}},settlement.bal?"\u2713 Chips balanced":"\u2717 Chips don't balance"),
          d("span",{style:{fontSize:13,color:C.td}},"$"+settlement.tFC+" / $"+settlement.tBC)
        ) : null;

        items.push(d("div",{key:"chips",style:cardS},
          d("div",{style:{fontSize:13,color:C.td,marginBottom:4,fontWeight:600}},"FINAL CHIP COUNTS"),
          d("div",{style:{fontSize:12,color:C.tm,marginBottom:12}},"Enter each player\u2019s chip total (in chip dollars). Total must equal $"+totalChipsNeeded+"."),
          d("div",{style:{display:"flex",flexDirection:"column",gap:8}},chipRows),
          balanceEl
        ));

        // Food
        var nhPlayers = players.filter(function(p){return p.id!==hostId}).length;
        var foodSub = "Split among "+nhPlayers+" players (host exempt)"+(snackId?" \xB7 "+(players.find(function(p){return p.id===snackId})||{}).name+" gets reimbursed":"");
        var foodPer = foodCost&&parseFloat(foodCost)>0&&hostId ? d("div",{style:{fontSize:12,color:C.tm,marginTop:6}},"Each non-host pays: $"+(parseFloat(foodCost)/nhPlayers).toFixed(0)) : null;

        items.push(d("div",{key:"food",style:cardS},
          d("div",{style:{fontSize:13,color:C.td,marginBottom:4,fontWeight:600}},"FOOD COST"),
          d("div",{style:{fontSize:12,color:C.tm,marginBottom:8}},foodSub),
          d("div",{style:{display:"flex",alignItems:"center",gap:8}},
            d("span",{style:{color:C.tm,fontSize:16}},"$"),
            d("input",{type:"number",style:inpS,placeholder:"0.00",value:foodCost,onChange:function(e){setFoodCost(e.target.value)},min:"0",step:"0.01"})
          ),
          foodPer
        ));

        // Bonuses
        var bonusRows = players.map(function(p) {
          function bBtn(field, val, inc) {
            var cur = p[field];
            return d("button",{onClick:function(){if(inc||cur>0)upd(p.id,field,cur+(inc?1:-1))},style:Object.assign({},btnB,{background:inc?C.gold:C.bg,color:inc?"#000":C.text,border:inc?"none":"1px solid "+C.border,width:28,height:28,padding:0,borderRadius:"50%",fontWeight:700,fontSize:13,opacity:!inc&&cur===0?0.3:1})},inc?"+":"\u2212");
          }
          return d("div",{key:p.id,style:{display:"flex",alignItems:"center",gap:8,marginBottom:8}},
            d("span",{style:{width:100,fontSize:14,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},p.name),
            d("div",{style:{display:"flex",alignItems:"center",gap:4}},
              d("span",{style:{fontSize:11,color:C.gold}},"SF"),bBtn("straightFlushes",0,false),
              d("span",{style:{fontSize:14,fontWeight:700,minWidth:16,textAlign:"center"}},p.straightFlushes),bBtn("straightFlushes",0,true)
            ),
            d("div",{style:{display:"flex",alignItems:"center",gap:4,marginLeft:8}},
              d("span",{style:{fontSize:11,color:C.gold}},"RF"),bBtn("royalFlushes",0,false),
              d("span",{style:{fontSize:14,fontWeight:700,minWidth:16,textAlign:"center"}},p.royalFlushes),bBtn("royalFlushes",0,true)
            )
          );
        });

        items.push(d("div",{key:"bonus",style:cardS},
          d("div",{style:{fontSize:13,color:C.td,marginBottom:4,fontWeight:600}},"HOUSE RULES BONUSES"),
          d("div",{style:{fontSize:12,color:C.tm,marginBottom:12}},"Straight Flush = $"+SFB+" \xB7 Royal Flush = $"+RFB),
          bonusRows
        ));

        // Calculate button
        if (!settled) {
          var label = !settlement||!settlement.bal?"Fix chip counts first":players.some(function(p){return p.finalChips===""})?"Enter all chip counts":"Calculate Settlement";
          items.push(d("button",{key:"calc",onClick:function(){if(canSettle)setSettled(true)},disabled:!canSettle,style:Object.assign({},btnB,{background:C.ac,color:"#fff",padding:14,fontSize:16,width:"100%",opacity:canSettle?1:0.4,cursor:canSettle?"pointer":"not-allowed"})},label));
        }

        // Results
        if (settled && settlement) {
          var sorted = settlement.results.slice().sort(function(a,b){return b.net-a.net});

          // Summary table
          var thead = d("thead",null,d("tr",{style:{borderBottom:"1px solid "+C.border}},
            d("th",{style:{textAlign:"left",padding:"6px 4px",color:C.td,fontWeight:600}},"Player"),
            d("th",{style:{textAlign:"right",padding:"6px 4px",color:C.td,fontWeight:600}},"Poker"),
            d("th",{style:{textAlign:"right",padding:"6px 4px",color:C.td,fontWeight:600}},"Food"),
            d("th",{style:{textAlign:"right",padding:"6px 4px",color:C.td,fontWeight:600}},"Bonus"),
            d("th",{style:{textAlign:"right",padding:"6px 4px",color:C.td,fontWeight:700}},"Net")
          ));

          var tbody = d("tbody",null,sorted.map(function(r){
            return d("tr",{key:r.id,style:{borderBottom:"1px solid "+C.border+"22"}},
              d("td",{style:{padding:"8px 4px",fontWeight:600}},r.name,RID===r.id?d("span",{style:Object.assign({},badge(C.greenBg,C.green),{marginLeft:4,fontSize:9})},"B"):null),
              d("td",{style:{textAlign:"right",padding:"8px 4px",color:r.pnl>=0?C.green:C.red}},(r.pnl>=0?"+":"")+"$"+r.pnl.toFixed(0)),
              d("td",{style:{textAlign:"right",padding:"8px 4px",color:r.fb>=0?C.green:C.td}},(r.fb>=0?"+":"")+"$"+r.fb.toFixed(0)),
              d("td",{style:{textAlign:"right",padding:"8px 4px",color:r.hrn>0?C.gold:r.hrn<0?C.td:C.tm}},(r.hrn>=0?"+":"")+"$"+r.hrn.toFixed(0)),
              d("td",{style:{textAlign:"right",padding:"8px 4px",fontWeight:800,fontSize:14,color:r.net>=0?C.green:C.red}},(r.net>=0?"+":"")+"$"+r.net.toFixed(0))
            );
          }));

          var tfoot = d("tfoot",null,d("tr",{style:{borderTop:"2px solid "+C.border}},
            d("td",{style:{padding:"8px 4px",fontWeight:700,color:C.td}},"Totals"),
            d("td",{style:{textAlign:"right",padding:"8px 4px",color:C.tm}},"$"+settlement.tP.toFixed(0)),
            d("td",{style:{textAlign:"right",padding:"8px 4px",color:C.tm}},"$"+settlement.tF.toFixed(0)),
            d("td",{style:{textAlign:"right",padding:"8px 4px",color:C.tm}},"$"+settlement.tH.toFixed(0)),
            d("td",{style:{textAlign:"right",padding:"8px 4px",color:C.tm,fontWeight:700}},"$"+settlement.tN.toFixed(0))
          ));

          items.push(d("div",{key:"summary",style:Object.assign({},cardS,{borderColor:C.ac})},
            d("div",{style:{fontSize:13,color:C.ac,marginBottom:12,fontWeight:700}},"\u2713 SETTLEMENT SUMMARY"),
            d("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:13}},thead,tbody,tfoot)
          ));

          // Banker settlement
          if (settlement.bS.length>0) {
            var bRows = settlement.bS.slice().sort(function(a,b){return a.amount-b.amount}).map(function(s,i){
              return d("div",{key:i,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",background:s.amount<0?C.redBg:C.greenBg,borderRadius:8}},
                d("span",{style:{fontWeight:600,fontSize:14}},s.name),
                d("span",{style:{fontWeight:800,fontSize:15,color:s.amount<0?C.red:C.green}},s.amount<0?"pays $"+Math.abs(s.amount).toFixed(0)+" \u2192":"\u2190 gets $"+s.amount.toFixed(0))
              );
            });
            items.push(d("div",{key:"banker",style:Object.assign({},cardS,{borderColor:C.gold})},
              d("div",{style:{fontSize:13,color:C.gold,marginBottom:12,fontWeight:700}},"\uD83D\uDCB0 BANKER SETTLEMENT \u2014 "+(settlement.banker?settlement.banker.name:"")),
              d("div",{style:{display:"flex",flexDirection:"column",gap:8}},bRows),
              d("div",{style:{marginTop:12,padding:"8px 12px",borderRadius:8,background:C.bg,fontSize:12,color:C.tm,textAlign:"center"}},"Banker\u2019s own net: "+(settlement.banker.net>=0?"+":"")+"$"+settlement.banker.net.toFixed(0))
            ));
          }

          // Verification
          items.push(d("div",{key:"verify",style:Object.assign({},cardS,{background:C.bg,border:"1px dashed "+C.border})},
            d("div",{style:{fontSize:11,color:C.tm,fontWeight:600,marginBottom:8}},"VERIFICATION"),
            d("div",{style:{fontSize:12,color:C.tm,lineHeight:1.8}},
              "Poker P&L sum: $"+settlement.tP.toFixed(0)+" "+(Math.abs(settlement.tP)<0.01?"\u2713":"\u2717"),
              d("br"),"Food balance sum: $"+settlement.tF.toFixed(0)+" "+(Math.abs(settlement.tF)<0.01?"\u2713":"\u2717"),
              d("br"),"House rules sum: $"+settlement.tH.toFixed(0)+" "+(Math.abs(settlement.tH)<0.01?"\u2713":"\u2717"),
              d("br"),"Overall net sum: $"+settlement.tN.toFixed(0)+" "+(Math.abs(settlement.tN)<0.01?"\u2713":"\u2717")
            )
          ));

          items.push(d("button",{key:"newsess",onClick:newSess,style:Object.assign({},btnB,{background:C.ac,color:"#fff",padding:12,fontSize:15,width:"100%"})},"New Session (keep roster)"));
        }

        return d("div",{style:{display:"flex",flexDirection:"column",gap:16}},items);
      }

      // Reset modal
      var modal = showReset ? d("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20},onClick:function(){setShowReset(false)}},
        d("div",{style:Object.assign({},cardS,{maxWidth:360,width:"100%"}),onClick:function(e){e.stopPropagation()}},
          d("div",{style:{fontSize:16,fontWeight:700,marginBottom:8}},"Full reset?"),
          d("div",{style:{fontSize:13,color:C.td,marginBottom:16,lineHeight:1.6}},"This will set all players to \u201COut\u201D (except Rishabh) and clear all game data. Your full roster is preserved \u2014 no players are removed."),
          d("div",{style:{display:"flex",gap:8}},
            d("button",{onClick:function(){setShowReset(false)},style:Object.assign({},btnB,{flex:1,background:C.bg,color:C.td,border:"1px solid "+C.border})},"Cancel"),
            d("button",{onClick:resetAll,style:Object.assign({},btnB,{flex:1,background:"transparent",color:C.red,border:"1px solid "+C.red})},"Yes, Reset")
          )
        )
      ) : null;

      var content;
      if (tab===0) content = renderSetup();
      else if (tab===1) content = renderBuyins();
      else content = renderSettle();

      return d("div",{style:{fontFamily:"'JetBrains Mono',monospace",background:C.bg,color:C.text,minHeight:"100vh",padding:0}},
        header,
        d("div",{style:{padding:20,maxWidth:600,margin:"0 auto"}},content),
        modal
      );
    }

    function App() {
      if (!firebaseReady) return React.createElement(SetupBanner, null);
      return React.createElement(PokerCalculator, null);
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App, null));
  </script>
</body>
</html>
