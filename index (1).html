<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>♠ Poker Night</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♠</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body,#root{height:100%}
    body{font-family:'JetBrains Mono',monospace;background:#faf8f9}
    input,select,button{font-family:inherit}
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
    input[type="number"]{-moz-appearance:textfield}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import { createElement as h, useState, useCallback, useMemo, useEffect, useRef } from "https://esm.sh/react@18.3.1";
    import { createRoot } from "https://esm.sh/react-dom@18.3.1/client";
    import htm from "https://esm.sh/htm@3.1.1";
    const html = htm.bind(h);

    // ╔══════════════════════════════════════════════════════════════╗
    // ║  🔧 FIREBASE CONFIG — Replace with your project's values   ║
    // ╚══════════════════════════════════════════════════════════════╝
    const firebaseConfig = {
  apiKey: "AIzaSyB15URueHpFcQmdT_mJbzyilfBdHYq6Kno",
  authDomain: "poker-night-7a1a7.firebaseapp.com",
  databaseURL: "https://poker-night-7a1a7-default-rtdb.firebaseio.com",
  projectId: "poker-night-7a1a7",
  storageBucket: "poker-night-7a1a7.firebasestorage.app",
  messagingSenderId: "385328314369",
  appId: "1:385328314369:web:b6d72e77f0a17fcdeda800",
  measurementId: "G-YQPQV4761F"
};


    let db = null;
    let firebaseReady = false;
    try {
      if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        firebaseReady = true;
      }
    } catch (e) { console.error("Firebase init failed:", e); }

    const BUYIN_COST = 25, CHIP_VALUE = 100, CHIP_TO_DOLLAR = 25 / 100;
    const SF_BONUS = 25, RF_BONUS = 50;
    const TABS = ["Setup", "Buy-ins", "Settle"];
    const RISHABH_ID = "rishabh-banker";

    const makePlayer = (name, id, playing = false) => ({
      name, id: id || String(Date.now()) + String(Math.random()).slice(2, 8),
      playing, buyins: 1, finalChips: "", straightFlushes: 0, royalFlushes: 0,
    });

    const DEFAULT_ROSTER = [
      makePlayer("Rishabh", RISHABH_ID, true), makePlayer("Tejaswi", "tejaswi-01", true),
      makePlayer("Aman", "aman-01", true), makePlayer("Priya", "priya-01", true),
      makePlayer("Vikram", "vikram-01", true), makePlayer("Neha", "neha-01", true),
      makePlayer("Arjun", "arjun-01", true), makePlayer("Kavya", "kavya-01", true),
      makePlayer("Rohan", "rohan-01", true), makePlayer("Ananya", "ananya-01", true),
      makePlayer("Siddharth", "siddharth-01", false), makePlayer("Meera", "meera-01", false),
      makePlayer("Rahul", "rahul-01", false), makePlayer("Shreya", "shreya-01", false),
      makePlayer("Dev", "dev-01", false), makePlayer("Pooja", "pooja-01", false),
      makePlayer("Karan", "karan-01", false), makePlayer("Nisha", "nisha-01", false),
      makePlayer("Varun", "varun-01", false), makePlayer("Aisha", "aisha-01", false),
    ];

    const C = {
      bg:"#faf8f9",card:"#ffffff",border:"#e8dfe3",
      green:"#6b9e7a",greenBg:"rgba(107,158,122,0.08)",
      red:"#c25d5d",redBg:"rgba(194,93,93,0.07)",
      gold:"#a07040",goldBg:"rgba(160,112,64,0.08)",
      text:"#2d2832",textDim:"#6b5f72",textMuted:"#a89aae",
      blue:"#7e85b2",blueBg:"rgba(126,133,178,0.08)",
      accent:"#c4899a",accentBg:"rgba(196,137,154,0.10)",
    };

    const cardS = {background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:16,boxShadow:"0 1px 3px rgba(0,0,0,0.04)"};
    const btnB = {border:"none",borderRadius:8,cursor:"pointer",fontWeight:600,fontSize:14,padding:"8px 16px",transition:"all 0.15s"};
    const btnP = {...btnB,background:C.accent,color:"#fff"};
    const btnD = {...btnB,background:"transparent",color:C.red,border:`1px solid ${C.red}`};
    const btnS = {...btnB,padding:"4px 10px",fontSize:13};
    const inpS = {background:"#fff",border:`1px solid ${C.border}`,borderRadius:8,color:C.text,padding:"10px 12px",fontSize:15,outline:"none",width:"100%",boxSizing:"border-box"};
    const badgeS = (bg,col) => ({display:"inline-block",fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:20,background:bg,color:col,letterSpacing:0.5,textTransform:"uppercase"});
    const togS = (a) => ({...btnS,padding:"5px 14px",fontSize:13,borderRadius:20,fontWeight:700,background:a?C.greenBg:C.bg,color:a?C.green:C.textMuted,border:`1.5px solid ${a?C.green:C.border}`,cursor:"pointer",minWidth:52,transition:"all 0.15s"});

    function SetupBanner() {
      return html`<div style=${{fontFamily:"'JetBrains Mono',monospace",background:C.bg,color:C.text,minHeight:"100vh"}}>
        <div style=${{background:"linear-gradient(135deg,#fff 0%,#faf5f7 100%)",borderBottom:`1px solid ${C.border}`,padding:20}}>
          <h1 style=${{margin:0,fontSize:22,fontWeight:800,letterSpacing:-0.5,background:`linear-gradient(135deg,${C.accent},${C.gold})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>♠ Poker Night</h1>
        </div>
        <div style=${{padding:20,maxWidth:500,margin:"40px auto"}}>
          <div style=${cardS}>
            <div style=${{fontSize:18,fontWeight:700,marginBottom:12}}>🔧 Firebase Setup Required</div>
            <div style=${{fontSize:14,color:C.textDim,lineHeight:1.7,marginBottom:16}}>
              Open <code style=${{background:"#f5f0f2",padding:"2px 6px",borderRadius:4}}>index.html</code> and replace the <code style=${{background:"#f5f0f2",padding:"2px 6px",borderRadius:4}}>firebaseConfig</code> values with your Firebase project credentials. See SETUP.md for instructions.
            </div>
          </div>
        </div>
      </div>`;
    }

    function PokerCalculator() {
      const [tab, setTab] = useState(0);
      const [roster, setRoster] = useState(DEFAULT_ROSTER);
      const [loaded, setLoaded] = useState(false);
      const [newName, setNewName] = useState("");
      const [hostId, setHostId] = useState(null);
      const [snackId, setSnackId] = useState(null);
      const bankerId = RISHABH_ID;
      const [foodCost, setFoodCost] = useState("");
      const [settled, setSettled] = useState(false);
      const [showReset, setShowReset] = useState(false);
      const [editId, setEditId] = useState(null);
      const [editVal, setEditVal] = useState("");
      const [sync, setSync] = useState("connecting");
      const skip = useRef(false);

      useEffect(() => {
        if (!firebaseReady) { setLoaded(true); setSync("offline"); return; }
        const ref = db.ref("roster");
        const listener = ref.on("value", (snap) => {
          const data = snap.val();
          if (data && Array.isArray(data)) {
            if (!data.some(p => p.id === RISHABH_ID)) data.unshift({name:"Rishabh",id:RISHABH_ID,playing:true});
            else { const r = data.find(p => p.id === RISHABH_ID); if (r) r.playing = true; }
            skip.current = true;
            setRoster(prev => data.map(saved => {
              const ex = prev.find(p => p.id === saved.id);
              return ex ? {...ex, name:saved.name, playing:saved.playing, id:saved.id} : makePlayer(saved.name, saved.id, saved.playing);
            }));
          }
          setLoaded(true); setSync("synced");
        }, () => { setLoaded(true); setSync("error"); });
        return () => ref.off("value", listener);
      }, []);

      useEffect(() => {
        if (!loaded || !firebaseReady) return;
        if (skip.current) { skip.current = false; return; }
        const toSave = roster.map(p => ({name:p.name,id:p.id,playing:p.playing}));
        setSync("saving");
        db.ref("roster").set(toSave).then(() => setSync("synced")).catch(() => setSync("error"));
      }, [roster, loaded]);

      const players = useMemo(() => roster.filter(p => p.playing), [roster]);

      const addPlayer = useCallback(() => {
        const t = newName.trim();
        if (!t || roster.some(p => p.name.toLowerCase() === t.toLowerCase())) return;
        setRoster(prev => [...prev, makePlayer(t, null, true)]);
        setNewName("");
      }, [newName, roster]);

      const toggle = useCallback((id) => {
        if (id === RISHABH_ID) return;
        setRoster(prev => prev.map(p => p.id === id ? {...p, playing:!p.playing} : p));
        setHostId(prev => prev === id ? null : prev);
        setSnackId(prev => prev === id ? null : prev);
      }, []);

      const remove = useCallback((id) => {
        if (id === RISHABH_ID) return;
        setRoster(prev => prev.filter(p => p.id !== id));
        if (hostId === id) setHostId(null);
        if (snackId === id) setSnackId(null);
      }, [hostId, snackId]);

      const upd = useCallback((id, f, v) => {
        if (["buyins","finalChips","straightFlushes","royalFlushes"].includes(f)) skip.current = true;
        setRoster(prev => prev.map(p => p.id === id ? {...p,[f]:v} : p));
      }, []);

      const startEdit = (p) => { setEditId(p.id); setEditVal(p.name); };
      const saveEdit = (id) => {
        const t = editVal.trim();
        if (t && !roster.some(p => p.id !== id && p.name.toLowerCase() === t.toLowerCase())) upd(id,"name",t);
        setEditId(null); setEditVal("");
      };

      const resetAll = useCallback(() => {
        setRoster(prev => prev.map(p => ({...p, playing:p.id===RISHABH_ID, buyins:1, finalChips:"", straightFlushes:0, royalFlushes:0})));
        setHostId(null); setSnackId(null); setFoodCost(""); setSettled(false); setTab(0); setShowReset(false);
      }, []);

      const newSess = useCallback(() => {
        skip.current = true;
        setRoster(prev => prev.map(p => ({...p, buyins:1, finalChips:"", straightFlushes:0, royalFlushes:0})));
        setHostId(null); setSnackId(null); setFoodCost(""); setSettled(false); setTab(0); setShowReset(false);
      }, []);

      const settlement = useMemo(() => {
        if (players.length < 2) return null;
        const tBC = players.reduce((s,p) => s + p.buyins*CHIP_VALUE, 0);
        const tFC = players.reduce((s,p) => s + (parseFloat(p.finalChips)||0), 0);
        const bal = Math.abs(tBC - tFC) < 0.01;
        const food = parseFloat(foodCost)||0;
        const nhc = players.filter(p => p.id !== hostId).length;
        const fs = nhc > 0 ? food/nhc : 0;

        const res = players.map(p => {
          const tbd = p.buyins*BUYIN_COST;
          const cdv = (parseFloat(p.finalChips)||0)*CHIP_TO_DOLLAR;
          const pnl = cdv - tbd;
          let fb = 0;
          if (p.id !== hostId) fb -= fs;
          if (p.id === snackId) fb += food;
          const be = p.straightFlushes*SF_BONUS + p.royalFlushes*RF_BONUS;
          return {...p, tbd, cdv, pnl, fb, be};
        });

        const tbc2 = res.map(() => 0);
        res.forEach((r,i) => { if (r.be > 0) { const c = r.be/(players.length-1); res.forEach((_,j) => { if (i!==j) tbc2[j]+=c; }); } });

        const fin = res.map((r,i) => {
          const hrn = r.be - tbc2[i];
          const raw = r.pnl + r.fb + hrn;
          return {...r, hrc:tbc2[i], hrn, net:Math.round(raw), raw};
        });

        const tPnL = fin.reduce((s,r) => s+r.pnl, 0);
        const tFB = fin.reduce((s,r) => s+r.fb, 0);
        const tHR = fin.reduce((s,r) => s+r.hrn, 0);
        const tNB = fin.reduce((s,r) => s+r.raw, 0);
        const banker = fin.find(r => r.id === bankerId);
        const bSettle = fin.filter(r => r.id !== bankerId).map(r => ({name:r.name,amount:r.net})).filter(r => Math.abs(r.amount) > 0.005);

        return {results:fin, tBC, tFC, bal, tPnL, tFB, tHR, tNB, banker, bSettle};
      }, [players, hostId, snackId, bankerId, foodCost]);

      const canSettle = players.length >= 2 && players.every(p => p.finalChips !== "") && settlement?.bal;

      const syncDot = {width:8,height:8,borderRadius:"50%",display:"inline-block",marginRight:6};
      const syncC = {synced:"#6b9e7a",saving:"#a07040",connecting:"#7e85b2",error:"#c25d5d",offline:"#a89aae"};
      const syncL = {synced:"Synced",saving:"Saving…",connecting:"Connecting…",error:"Sync error",offline:"Local only"};

      if (!loaded) return html`<div style=${{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"'JetBrains Mono',monospace",color:C.textMuted}}>Loading…</div>`;

      return html`<div style=${{fontFamily:"'JetBrains Mono',monospace",background:C.bg,color:C.text,minHeight:"100vh",padding:0}}>
        <!-- Header -->
        <div style=${{background:"linear-gradient(135deg,#fff 0%,#faf5f7 100%)",borderBottom:`1px solid ${C.border}`,padding:"20px 20px 0",position:"sticky",top:0,zIndex:10}}>
          <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
            <div>
              <h1 style=${{margin:0,fontSize:22,fontWeight:800,letterSpacing:-0.5,background:`linear-gradient(135deg,${C.accent},${C.gold})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>♠ Poker Night</h1>
              <div style=${{fontSize:12,color:C.textMuted,marginTop:2}}>$1/$2 NL · $${BUYIN_COST} buy-in · ${players.length} playing / ${roster.length} in roster</div>
            </div>
            ${firebaseReady && html`<div style=${{fontSize:11,color:syncC[sync],display:"flex",alignItems:"center"}}>
              <span style=${{...syncDot,background:syncC[sync]}}></span>${syncL[sync]}
            </div>`}
          </div>
          <div style=${{display:"flex",gap:0}}>
            ${TABS.map((t,i) => html`<button key=${t} onClick=${()=>setTab(i)} style=${{...btnB,background:"transparent",color:tab===i?C.accent:C.textDim,borderRadius:0,borderBottom:`2px solid ${tab===i?C.accent:"transparent"}`,padding:"8px 20px 12px",fontSize:14}}>${t}</button>`)}
          </div>
        </div>

        <div style=${{padding:20,maxWidth:600,margin:"0 auto"}}>

          ${tab === 0 && html`<div style=${{display:"flex",flexDirection:"column",gap:16}}>
            <div>
              <div style=${{display:"flex",gap:8}}>
                <button onClick=${newSess} style=${{...btnB,flex:1,padding:12,fontSize:14,background:C.accentBg,color:C.accent,border:`1px solid ${C.accent}`}}>🔄 New Session</button>
                <button onClick=${()=>setShowReset(true)} style=${{...btnB,padding:"12px 16px",fontSize:14,background:C.redBg,color:C.red,border:"1px solid transparent"}}>🗑 Full Reset</button>
              </div>
              <div style=${{fontSize:11,color:C.textMuted,marginTop:6,lineHeight:1.5}}>New Session keeps roster & toggles, clears game data · Full Reset sets everyone to Out</div>
            </div>

            <div style=${cardS}>
              <div style=${{fontSize:13,color:C.textDim,marginBottom:8,fontWeight:600}}>ADD TO ROSTER</div>
              <div style=${{display:"flex",gap:8}}>
                <input style=${inpS} placeholder="Player name" value=${newName} onInput=${e=>setNewName(e.target.value)} onKeyDown=${e=>e.key==="Enter"&&addPlayer()} />
                <button onClick=${addPlayer} style=${{...btnP,whiteSpace:"nowrap"}}>Add</button>
              </div>
              <div style=${{fontSize:11,color:C.textMuted,marginTop:6}}>New players are saved permanently. Tap a name to rename.</div>
            </div>

            <div style=${cardS}>
              <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style=${{fontSize:13,color:C.textDim,fontWeight:600}}>PLAYER ROSTER (${roster.length})</div>
                <div style=${{fontSize:12,color:C.accent,fontWeight:600}}>${players.length} playing</div>
              </div>
              <div style=${{display:"flex",flexDirection:"column",gap:6}}>
                ${roster.map(p => html`<div key=${p.id} style=${{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 12px",background:p.playing?C.card:C.bg,borderRadius:8,gap:8,opacity:p.playing?1:0.55,border:`1px solid ${p.playing?C.border:"transparent"}`,transition:"all 0.15s"}}>
                  <div style=${{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0}}>
                    ${editId===p.id
                      ? html`<input style=${{...inpS,padding:"4px 8px",fontSize:14,width:"auto",flex:1}} value=${editVal} onInput=${e=>setEditVal(e.target.value)} onBlur=${()=>saveEdit(p.id)} onKeyDown=${e=>e.key==="Enter"&&saveEdit(p.id)} autoFocus />`
                      : html`<div style=${{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}} onClick=${()=>startEdit(p)} title="Click to rename">
                          <span style=${{fontWeight:600,fontSize:15}}>${p.name}</span>
                          <span style=${{fontSize:12,color:C.textMuted,lineHeight:1}}>✎</span>
                        </div>`}
                    <div style=${{display:"flex",gap:4,flexWrap:"wrap"}}>
                      ${hostId===p.id && html`<span style=${badgeS(C.blueBg,C.blue)}>Host</span>`}
                      ${snackId===p.id && html`<span style=${badgeS(C.goldBg,C.gold)}>Snacks</span>`}
                      ${bankerId===p.id && html`<span style=${badgeS(C.greenBg,C.green)}>Banker</span>`}
                    </div>
                  </div>
                  <div style=${{display:"flex",alignItems:"center",gap:6}}>
                    <button onClick=${()=>toggle(p.id)} style=${togS(p.playing)} title=${p.id===RISHABH_ID?"Rishabh always plays":(p.playing?"Sit out":"Join game")} disabled=${p.id===RISHABH_ID}>${p.playing?"In":"Out"}</button>
                    ${p.id!==RISHABH_ID && html`<button onClick=${()=>remove(p.id)} style=${{...btnS,color:C.textMuted,background:"transparent",padding:"4px 6px",fontSize:12,opacity:0.5}} title=${`Remove ${p.name} permanently`}>✕</button>`}
                  </div>
                </div>`)}
              </div>
            </div>

            ${players.length >= 2 && html`<div style=${cardS}>
              <div style=${{fontSize:13,color:C.textDim,marginBottom:12,fontWeight:600}}>ASSIGN ROLES</div>
              <div style=${{display:"flex",flexDirection:"column",gap:12}}>
                ${[{l:"Host",s:"Exempt from food costs",v:hostId,fn:setHostId},{l:"Snack Provider",s:"Gets reimbursed for food",v:snackId,fn:setSnackId}].map(({l,s,v,fn})=>html`<div key=${l}>
                  <div style=${{fontSize:14,fontWeight:600,marginBottom:4}}>${l}</div>
                  <div style=${{fontSize:12,color:C.textMuted,marginBottom:6}}>${s}</div>
                  <select style=${{...inpS,cursor:"pointer"}} value=${v||""} onChange=${e=>fn(e.target.value||null)}>
                    <option value="">— Select —</option>
                    ${players.map(p=>html`<option key=${p.id} value=${p.id}>${p.name}</option>`)}
                  </select>
                </div>`)}
              </div>
            </div>`}

            ${players.length>=2 && hostId && html`<button onClick=${()=>setTab(1)} style=${{...btnP,padding:12,fontSize:16,width:"100%"}}>Start Game →</button>`}
          </div>`}

          ${tab === 1 && html`<div style=${{display:"flex",flexDirection:"column",gap:12}}>
            <div style=${{...cardS,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style=${{fontSize:13,color:C.textDim,fontWeight:600}}>TOTAL IN PLAY</div>
                <div style=${{fontSize:24,fontWeight:800,color:C.accent,marginTop:4}}>$${players.reduce((s,p)=>s+p.buyins*BUYIN_COST,0)}</div>
              </div>
              <div style=${{textAlign:"right"}}>
                <div style=${{fontSize:13,color:C.textDim}}>${players.reduce((s,p)=>s+p.buyins,0)} buy-ins</div>
                <div style=${{fontSize:13,color:C.textDim}}>$${players.reduce((s,p)=>s+p.buyins*CHIP_VALUE,0)} in chips</div>
              </div>
            </div>
            ${players.map(p=>html`<div key=${p.id} style=${{...cardS,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style=${{fontWeight:700,fontSize:15}}>${p.name}${hostId===p.id&&html`<span style=${{...badgeS(C.blueBg,C.blue),marginLeft:6}}>H</span>`}</div>
                <div style=${{fontSize:12,color:C.textMuted,marginTop:2}}>$${p.buyins*BUYIN_COST} invested · $${p.buyins*CHIP_VALUE} chips</div>
              </div>
              <div style=${{display:"flex",alignItems:"center",gap:10}}>
                <button onClick=${()=>p.buyins>1&&upd(p.id,"buyins",p.buyins-1)} disabled=${p.buyins<=1} style=${{...btnS,background:C.bg,color:p.buyins<=1?C.textMuted:C.text,border:`1px solid ${C.border}`,width:36,height:36,padding:0,fontSize:18,borderRadius:"50%",opacity:p.buyins<=1?0.4:1}}>−</button>
                <span style=${{fontSize:20,fontWeight:800,minWidth:24,textAlign:"center"}}>${p.buyins}</span>
                <button onClick=${()=>upd(p.id,"buyins",p.buyins+1)} style=${{...btnS,background:C.accent,color:"#fff",width:36,height:36,padding:0,fontSize:18,borderRadius:"50%"}}>+</button>
              </div>
            </div>`)}
            <button onClick=${()=>setTab(2)} style=${{...btnP,padding:12,fontSize:16,width:"100%"}}>End Game & Settle →</button>
          </div>`}

          ${tab === 2 && html`<div style=${{display:"flex",flexDirection:"column",gap:16}}>
            <div style=${cardS}>
              <div style=${{fontSize:13,color:C.textDim,marginBottom:4,fontWeight:600}}>FINAL CHIP COUNTS</div>
              <div style=${{fontSize:12,color:C.textMuted,marginBottom:12}}>Enter each player's chip total (in chip dollars). Total must equal $${players.reduce((s,p)=>s+p.buyins*CHIP_VALUE,0)}.</div>
              <div style=${{display:"flex",flexDirection:"column",gap:8}}>
                ${players.map(p=>html`<div key=${p.id} style=${{display:"flex",alignItems:"center",gap:10}}>
                  <span style=${{width:100,fontSize:14,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${p.name}</span>
                  <span style=${{color:C.textMuted,fontSize:13}}>$</span>
                  <input type="number" style=${{...inpS,flex:1,textAlign:"right"}} placeholder="0" value=${p.finalChips} onInput=${e=>upd(p.id,"finalChips",e.target.value)} min="0" step="0.25" />
                  <span style=${{fontSize:12,color:C.textMuted,minWidth:60,textAlign:"right"}}>= $${((parseFloat(p.finalChips)||0)*CHIP_TO_DOLLAR).toFixed(2)}</span>
                </div>`)}
              </div>
              ${settlement && html`<div style=${{marginTop:12,padding:"10px 12px",borderRadius:8,background:settlement.bal?C.greenBg:C.redBg,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style=${{fontSize:13,color:settlement.bal?C.green:C.red}}>${settlement.bal?"✓ Chips balanced":"✗ Chips don't balance"}</span>
                <span style=${{fontSize:13,color:C.textDim}}>$${settlement.tFC} / $${settlement.tBC}</span>
              </div>`}
            </div>

            <div style=${cardS}>
              <div style=${{fontSize:13,color:C.textDim,marginBottom:4,fontWeight:600}}>FOOD COST</div>
              <div style=${{fontSize:12,color:C.textMuted,marginBottom:8}}>Split among ${players.filter(p=>p.id!==hostId).length} players (host exempt)${snackId?` · ${players.find(p=>p.id===snackId)?.name} gets reimbursed`:""}</div>
              <div style=${{display:"flex",alignItems:"center",gap:8}}>
                <span style=${{color:C.textMuted,fontSize:16}}>$</span>
                <input type="number" style=${inpS} placeholder="0.00" value=${foodCost} onInput=${e=>setFoodCost(e.target.value)} min="0" step="0.01" />
              </div>
              ${foodCost&&parseFloat(foodCost)>0&&hostId&&html`<div style=${{fontSize:12,color:C.textMuted,marginTop:6}}>Each non-host pays: $${(parseFloat(foodCost)/players.filter(p=>p.id!==hostId).length).toFixed(0)}</div>`}
            </div>

            <div style=${cardS}>
              <div style=${{fontSize:13,color:C.textDim,marginBottom:4,fontWeight:600}}>HOUSE RULES BONUSES</div>
              <div style=${{fontSize:12,color:C.textMuted,marginBottom:12}}>Straight Flush = $${SF_BONUS} · Royal Flush = $${RF_BONUS}</div>
              ${players.map(p=>html`<div key=${p.id} style=${{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <span style=${{width:100,fontSize:14,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${p.name}</span>
                <div style=${{display:"flex",alignItems:"center",gap:4}}>
                  <span style=${{fontSize:11,color:C.gold}}>SF</span>
                  <button onClick=${()=>p.straightFlushes>0&&upd(p.id,"straightFlushes",p.straightFlushes-1)} style=${{...btnS,background:C.bg,color:C.text,border:`1px solid ${C.border}`,width:28,height:28,padding:0,borderRadius:"50%",opacity:p.straightFlushes===0?0.3:1}}>−</button>
                  <span style=${{fontSize:14,fontWeight:700,minWidth:16,textAlign:"center"}}>${p.straightFlushes}</span>
                  <button onClick=${()=>upd(p.id,"straightFlushes",p.straightFlushes+1)} style=${{...btnS,background:C.gold,color:"#000",width:28,height:28,padding:0,borderRadius:"50%",fontWeight:700}}>+</button>
                </div>
                <div style=${{display:"flex",alignItems:"center",gap:4,marginLeft:8}}>
                  <span style=${{fontSize:11,color:C.gold}}>RF</span>
                  <button onClick=${()=>p.royalFlushes>0&&upd(p.id,"royalFlushes",p.royalFlushes-1)} style=${{...btnS,background:C.bg,color:C.text,border:`1px solid ${C.border}`,width:28,height:28,padding:0,borderRadius:"50%",opacity:p.royalFlushes===0?0.3:1}}>−</button>
                  <span style=${{fontSize:14,fontWeight:700,minWidth:16,textAlign:"center"}}>${p.royalFlushes}</span>
                  <button onClick=${()=>upd(p.id,"royalFlushes",p.royalFlushes+1)} style=${{...btnS,background:C.gold,color:"#000",width:28,height:28,padding:0,borderRadius:"50%",fontWeight:700}}>+</button>
                </div>
              </div>`)}
            </div>

            ${!settled && html`<button onClick=${()=>canSettle&&setSettled(true)} disabled=${!canSettle} style=${{...btnP,padding:14,fontSize:16,width:"100%",opacity:canSettle?1:0.4,cursor:canSettle?"pointer":"not-allowed"}}>
              ${!settlement?.bal?"Fix chip counts first":players.some(p=>p.finalChips==="")?"Enter all chip counts":"Calculate Settlement"}
            </button>`}

            ${settled && settlement && html`<>
              <div style=${{...cardS,borderColor:C.accent}}>
                <div style=${{fontSize:13,color:C.accent,marginBottom:12,fontWeight:700}}>✓ SETTLEMENT SUMMARY</div>
                <table style=${{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead><tr style=${{borderBottom:`1px solid ${C.border}`}}>
                    <th style=${{textAlign:"left",padding:"6px 4px",color:C.textDim,fontWeight:600}}>Player</th>
                    <th style=${{textAlign:"right",padding:"6px 4px",color:C.textDim,fontWeight:600}}>Poker</th>
                    <th style=${{textAlign:"right",padding:"6px 4px",color:C.textDim,fontWeight:600}}>Food</th>
                    <th style=${{textAlign:"right",padding:"6px 4px",color:C.textDim,fontWeight:600}}>Bonus</th>
                    <th style=${{textAlign:"right",padding:"6px 4px",color:C.textDim,fontWeight:700}}>Net</th>
                  </tr></thead>
                  <tbody>
                    ${settlement.results.sort((a,b)=>b.net-a.net).map(r=>html`<tr key=${r.id} style=${{borderBottom:`1px solid ${C.border}22`}}>
                      <td style=${{padding:"8px 4px",fontWeight:600}}>${r.name}${bankerId===r.id&&html`<span style=${{...badgeS(C.greenBg,C.green),marginLeft:4,fontSize:9}}>B</span>`}</td>
                      <td style=${{textAlign:"right",padding:"8px 4px",color:r.pnl>=0?C.green:C.red}}>${r.pnl>=0?"+":""}$${r.pnl.toFixed(0)}</td>
                      <td style=${{textAlign:"right",padding:"8px 4px",color:r.fb>=0?C.green:C.textDim}}>${r.fb>=0?"+":""}$${r.fb.toFixed(0)}</td>
                      <td style=${{textAlign:"right",padding:"8px 4px",color:r.hrn>0?C.gold:r.hrn<0?C.textDim:C.textMuted}}>${r.hrn>=0?"+":""}$${r.hrn.toFixed(0)}</td>
                      <td style=${{textAlign:"right",padding:"8px 4px",fontWeight:800,fontSize:14,color:r.net>=0?C.green:C.red}}>${r.net>=0?"+":""}$${r.net.toFixed(0)}</td>
                    </tr>`)}
                  </tbody>
                  <tfoot><tr style=${{borderTop:`2px solid ${C.border}`}}>
                    <td style=${{padding:"8px 4px",fontWeight:700,color:C.textDim}}>Totals</td>
                    <td style=${{textAlign:"right",padding:"8px 4px",color:C.textMuted}}>$${settlement.tPnL.toFixed(0)}</td>
                    <td style=${{textAlign:"right",padding:"8px 4px",color:C.textMuted}}>$${settlement.tFB.toFixed(0)}</td>
                    <td style=${{textAlign:"right",padding:"8px 4px",color:C.textMuted}}>$${settlement.tHR.toFixed(0)}</td>
                    <td style=${{textAlign:"right",padding:"8px 4px",color:C.textMuted,fontWeight:700}}>$${settlement.tNB.toFixed(0)}</td>
                  </tr></tfoot>
                </table>
              </div>

              ${settlement.bSettle.length > 0 && html`<div style=${{...cardS,borderColor:C.gold}}>
                <div style=${{fontSize:13,color:C.gold,marginBottom:12,fontWeight:700}}>💰 BANKER SETTLEMENT — ${settlement.banker?.name}</div>
                <div style=${{display:"flex",flexDirection:"column",gap:8}}>
                  ${settlement.bSettle.sort((a,b)=>a.amount-b.amount).map((s,i)=>html`<div key=${i} style=${{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",background:s.amount<0?C.redBg:C.greenBg,borderRadius:8}}>
                    <span style=${{fontWeight:600,fontSize:14}}>${s.name}</span>
                    <span style=${{fontWeight:800,fontSize:15,color:s.amount<0?C.red:C.green}}>${s.amount<0?`pays $${Math.abs(s.amount).toFixed(0)} →`:`← gets $${s.amount.toFixed(0)}`}</span>
                  </div>`)}
                </div>
                <div style=${{marginTop:12,padding:"8px 12px",borderRadius:8,background:C.bg,fontSize:12,color:C.textMuted,textAlign:"center"}}>Banker's own net: ${settlement.banker.net>=0?"+":""}$${settlement.banker.net.toFixed(0)}</div>
              </div>`}

              <div style=${{...cardS,background:C.bg,border:`1px dashed ${C.border}`}}>
                <div style=${{fontSize:11,color:C.textMuted,fontWeight:600,marginBottom:8}}>VERIFICATION</div>
                <div style=${{fontSize:12,color:C.textMuted,lineHeight:1.8}}>
                  Poker P&L sum: $${settlement.tPnL.toFixed(0)} ${Math.abs(settlement.tPnL)<0.01?"✓":"✗"}<br/>
                  Food balance sum: $${settlement.tFB.toFixed(0)} ${Math.abs(settlement.tFB)<0.01?"✓":"✗"}<br/>
                  House rules sum: $${settlement.tHR.toFixed(0)} ${Math.abs(settlement.tHR)<0.01?"✓":"✗"}<br/>
                  Overall net sum: $${settlement.tNB.toFixed(0)} ${Math.abs(settlement.tNB)<0.01?"✓":"✗"}
                </div>
              </div>

              <button onClick=${newSess} style=${{...btnP,padding:12,fontSize:15,width:"100%"}}>New Session (keep roster)</button>
            </>`}
          </div>`}
        </div>

        ${showReset && html`<div style=${{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}} onClick=${()=>setShowReset(false)}>
          <div style=${{...cardS,maxWidth:360,width:"100%"}} onClick=${e=>e.stopPropagation()}>
            <div style=${{fontSize:16,fontWeight:700,marginBottom:8}}>Full reset?</div>
            <div style=${{fontSize:13,color:C.textDim,marginBottom:16,lineHeight:1.6}}>This will set all players to "Out" (except Rishabh) and clear all game data. Your full roster is preserved — no players are removed.</div>
            <div style=${{display:"flex",gap:8}}>
              <button onClick=${()=>setShowReset(false)} style=${{...btnB,flex:1,background:C.bg,color:C.textDim,border:`1px solid ${C.border}`}}>Cancel</button>
              <button onClick=${resetAll} style=${{...btnD,flex:1}}>Yes, Reset</button>
            </div>
          </div>
        </div>`}
      </div>`;
    }

    function App() {
      if (!firebaseReady) return html`<${SetupBanner} />`;
      return html`<${PokerCalculator} />`;
    }

    createRoot(document.getElementById("root")).render(html`<${App} />`);
  </script>
</body>
</html>
