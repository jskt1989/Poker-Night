<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>♠ Poker Night</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♠</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">

  <!-- Firebase SDK (compat for easy CDN usage) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body, #root { height: 100%; }
    body { font-family: 'JetBrains Mono', monospace; background: #faf8f9; }
    input, select, button { font-family: inherit; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ╔══════════════════════════════════════════════════════════════╗
    // ║  🔧 FIREBASE CONFIG — Replace with your project's values   ║
    // ║  See SETUP.md for step-by-step instructions                ║
    // ╚══════════════════════════════════════════════════════════════╝
    const firebaseConfig = {
  apiKey: "AIzaSyB15URueHpFcQmdT_mJbzyilfBdHYq6Kno",
  authDomain: "poker-night-7a1a7.firebaseapp.com",
  databaseURL: "https://poker-night-7a1a7-default-rtdb.firebaseio.com",
  projectId: "poker-night-7a1a7",
  storageBucket: "poker-night-7a1a7.firebasestorage.app",
  messagingSenderId: "385328314369",
  appId: "1:385328314369:web:b6d72e77f0a17fcdeda800",
  measurementId: "G-YQPQV4761F"
};


    // ─── Initialize Firebase ───
    let db = null;
    let firebaseReady = false;
    try {
      if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        firebaseReady = true;
      }
    } catch (e) {
      console.error("Firebase init failed:", e);
    }

    // ─── Constants ───
    const { useState, useCallback, useMemo, useEffect, useRef } = React;
    const BUYIN_COST = 25;
    const CHIP_VALUE = 100;
    const CHIP_TO_DOLLAR = BUYIN_COST / CHIP_VALUE;
    const STRAIGHT_FLUSH_BONUS = 25;
    const ROYAL_FLUSH_BONUS = 50;
    const TABS = ["Setup", "Buy-ins", "Settle"];
    const RISHABH_ID = "rishabh-banker";

    const makePlayer = (name, id, playing = false) => ({
      name, id: id || String(Date.now()) + String(Math.random()).slice(2, 8),
      playing, buyins: 1, finalChips: "", straightFlushes: 0, royalFlushes: 0,
    });

    const DEFAULT_ROSTER = [
      makePlayer("Rishabh", RISHABH_ID, true),
      makePlayer("Tejaswi", "tejaswi-01", true),
      makePlayer("Aman", "aman-01", true),
      makePlayer("Priya", "priya-01", true),
      makePlayer("Vikram", "vikram-01", true),
      makePlayer("Neha", "neha-01", true),
      makePlayer("Arjun", "arjun-01", true),
      makePlayer("Kavya", "kavya-01", true),
      makePlayer("Rohan", "rohan-01", true),
      makePlayer("Ananya", "ananya-01", true),
      makePlayer("Siddharth", "siddharth-01", false),
      makePlayer("Meera", "meera-01", false),
      makePlayer("Rahul", "rahul-01", false),
      makePlayer("Shreya", "shreya-01", false),
      makePlayer("Dev", "dev-01", false),
      makePlayer("Pooja", "pooja-01", false),
      makePlayer("Karan", "karan-01", false),
      makePlayer("Nisha", "nisha-01", false),
      makePlayer("Varun", "varun-01", false),
      makePlayer("Aisha", "aisha-01", false),
    ];

    // ─── Firebase Setup Banner ───
    function SetupBanner() {
      const colors = { accent: "#c4899a", gold: "#a07040", text: "#2d2832", textDim: "#6b5f72", textMuted: "#a89aae", border: "#e8dfe3" };
      return (
        <div style={{
          fontFamily: "'JetBrains Mono', monospace", background: "#faf8f9",
          color: colors.text, minHeight: "100vh", padding: 0,
        }}>
          <div style={{
            background: "linear-gradient(135deg, #ffffff 0%, #faf5f7 100%)",
            borderBottom: `1px solid ${colors.border}`, padding: "20px",
          }}>
            <h1 style={{
              margin: 0, fontSize: 22, fontWeight: 800, letterSpacing: -0.5,
              background: `linear-gradient(135deg, ${colors.accent}, ${colors.gold})`,
              WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
            }}>♠ Poker Night</h1>
          </div>
          <div style={{ padding: 20, maxWidth: 500, margin: "40px auto" }}>
            <div style={{
              background: "#fff", border: `1px solid ${colors.border}`, borderRadius: 12,
              padding: 24, boxShadow: "0 1px 3px rgba(0,0,0,0.04)",
            }}>
              <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 12 }}>🔧 Firebase Setup Required</div>
              <div style={{ fontSize: 14, color: colors.textDim, lineHeight: 1.7, marginBottom: 16 }}>
                To enable shared roster sync, you need to connect this app to a Firebase project.
                Open <code style={{ background: "#f5f0f2", padding: "2px 6px", borderRadius: 4 }}>index.html</code> and
                replace the <code style={{ background: "#f5f0f2", padding: "2px 6px", borderRadius: 4 }}>firebaseConfig</code> values
                at the top of the script with your Firebase project credentials.
              </div>
              <div style={{ fontSize: 13, color: colors.textMuted, lineHeight: 1.6 }}>
                See <strong>SETUP.md</strong> for detailed step-by-step instructions.
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── Main App ───
    function PokerCalculator() {
      const [tab, setTab] = useState(0);
      const [roster, setRoster] = useState(DEFAULT_ROSTER);
      const [loaded, setLoaded] = useState(false);
      const [newName, setNewName] = useState("");
      const [hostId, setHostId] = useState(null);
      const [snackProviderId, setSnackProviderId] = useState(null);
      const bankerId = RISHABH_ID;
      const [foodCost, setFoodCost] = useState("");
      const [settled, setSettled] = useState(false);
      const [showConfirmReset, setShowConfirmReset] = useState(false);
      const [editingName, setEditingName] = useState(null);
      const [editValue, setEditValue] = useState("");
      const [syncStatus, setSyncStatus] = useState("connecting");
      const skipNextSave = useRef(false);

      // ─── Firebase Sync ───
      useEffect(() => {
        if (!firebaseReady) { setLoaded(true); setSyncStatus("offline"); return; }
        const rosterRef = db.ref("roster");
        const listener = rosterRef.on("value", (snapshot) => {
          const data = snapshot.val();
          if (data && Array.isArray(data)) {
            const hasRishabh = data.some(p => p.id === RISHABH_ID);
            if (!hasRishabh) data.unshift({ name: "Rishabh", id: RISHABH_ID, playing: true });
            else {
              const r = data.find(p => p.id === RISHABH_ID);
              if (r) r.playing = true;
            }
            skipNextSave.current = true;
            setRoster(prev => {
              return data.map(saved => {
                const existing = prev.find(p => p.id === saved.id);
                return existing
                  ? { ...existing, name: saved.name, playing: saved.playing, id: saved.id }
                  : makePlayer(saved.name, saved.id, saved.playing);
              });
            });
          }
          setLoaded(true);
          setSyncStatus("synced");
        }, (error) => {
          console.error("Firebase read error:", error);
          setLoaded(true);
          setSyncStatus("error");
        });
        return () => rosterRef.off("value", listener);
      }, []);

      // Save roster identity to Firebase when it changes
      useEffect(() => {
        if (!loaded || !firebaseReady) return;
        if (skipNextSave.current) { skipNextSave.current = false; return; }
        const toSave = roster.map(p => ({ name: p.name, id: p.id, playing: p.playing }));
        setSyncStatus("saving");
        db.ref("roster").set(toSave).then(() => {
          setSyncStatus("synced");
        }).catch((e) => {
          console.error("Firebase write error:", e);
          setSyncStatus("error");
        });
      }, [roster, loaded]);

      const players = useMemo(() => roster.filter(p => p.playing), [roster]);

      const addPlayer = useCallback(() => {
        const trimmed = newName.trim();
        if (!trimmed) return;
        if (roster.some(p => p.name.toLowerCase() === trimmed.toLowerCase())) return;
        setRoster(prev => [...prev, makePlayer(trimmed, null, true)]);
        setNewName("");
      }, [newName, roster]);

      const togglePlaying = useCallback((id) => {
        if (id === RISHABH_ID) return;
        setRoster(prev => prev.map(p => p.id === id ? { ...p, playing: !p.playing } : p));
        setHostId(prev => prev === id ? null : prev);
        setSnackProviderId(prev => prev === id ? null : prev);
      }, []);

      const removeFromRoster = useCallback((id) => {
        if (id === RISHABH_ID) return;
        setRoster(prev => prev.filter(p => p.id !== id));
        if (hostId === id) setHostId(null);
        if (snackProviderId === id) setSnackProviderId(null);
      }, [hostId, snackProviderId]);

      const updateRoster = useCallback((id, field, value) => {
        // For game-data-only fields, don't trigger Firebase save
        const gameDataFields = ["buyins", "finalChips", "straightFlushes", "royalFlushes"];
        if (gameDataFields.includes(field)) {
          skipNextSave.current = true;
        }
        setRoster(prev => prev.map(p => p.id === id ? { ...p, [field]: value } : p));
      }, []);

      const startEditName = (player) => { setEditingName(player.id); setEditValue(player.name); };

      const saveEditName = (id) => {
        const trimmed = editValue.trim();
        if (trimmed && !roster.some(p => p.id !== id && p.name.toLowerCase() === trimmed.toLowerCase())) {
          updateRoster(id, "name", trimmed);
        }
        setEditingName(null);
        setEditValue("");
      };

      const resetAll = useCallback(() => {
        setRoster(prev => prev.map(p => ({
          ...p, playing: p.id === RISHABH_ID,
          buyins: 1, finalChips: "", straightFlushes: 0, royalFlushes: 0,
        })));
        setHostId(null); setSnackProviderId(null); setFoodCost("");
        setSettled(false); setTab(0); setShowConfirmReset(false);
      }, []);

      const newSession = useCallback(() => {
        skipNextSave.current = true;
        setRoster(prev => prev.map(p => ({ ...p, buyins: 1, finalChips: "", straightFlushes: 0, royalFlushes: 0 })));
        setHostId(null); setSnackProviderId(null); setFoodCost("");
        setSettled(false); setTab(0); setShowConfirmReset(false);
      }, []);

      // ─── Settlement Math ───
      const settlement = useMemo(() => {
        if (players.length < 2) return null;
        const totalBuyinChips = players.reduce((s, p) => s + p.buyins * CHIP_VALUE, 0);
        const totalFinalChips = players.reduce((s, p) => s + (parseFloat(p.finalChips) || 0), 0);
        const chipsBalanced = Math.abs(totalBuyinChips - totalFinalChips) < 0.01;
        const food = parseFloat(foodCost) || 0;
        const nonHostCount = players.filter(p => p.id !== hostId).length;
        const foodShare = nonHostCount > 0 ? food / nonHostCount : 0;

        const results = players.map(p => {
          const totalBuyinDollars = p.buyins * BUYIN_COST;
          const chipsDollarValue = (parseFloat(p.finalChips) || 0) * CHIP_TO_DOLLAR;
          const pokerPnL = chipsDollarValue - totalBuyinDollars;
          let foodBalance = 0;
          if (p.id !== hostId) foodBalance -= foodShare;
          if (p.id === snackProviderId) foodBalance += food;
          const bonusEarned = p.straightFlushes * STRAIGHT_FLUSH_BONUS + p.royalFlushes * ROYAL_FLUSH_BONUS;
          return { ...p, totalBuyinDollars, chipsDollarValue, pokerPnL, foodBalance, bonusEarned };
        });

        const totalBonusCosts = results.map(() => 0);
        results.forEach((r, i) => {
          if (r.bonusEarned > 0) {
            const costPerOther = r.bonusEarned / (players.length - 1);
            results.forEach((_, j) => { if (i !== j) totalBonusCosts[j] += costPerOther; });
          }
        });

        const finalResults = results.map((r, i) => {
          const houseRuleNet = r.bonusEarned - totalBonusCosts[i];
          const netBalanceRaw = r.pokerPnL + r.foodBalance + houseRuleNet;
          const netBalance = Math.round(netBalanceRaw);
          return { ...r, houseRuleCost: totalBonusCosts[i], houseRuleNet, netBalance, netBalanceRaw };
        });

        const totalPokerPnL = finalResults.reduce((s, r) => s + r.pokerPnL, 0);
        const totalFoodBalance = finalResults.reduce((s, r) => s + r.foodBalance, 0);
        const totalHouseRuleNet = finalResults.reduce((s, r) => s + r.houseRuleNet, 0);
        const totalNetBalance = finalResults.reduce((s, r) => s + r.netBalanceRaw, 0);
        const banker = finalResults.find(r => r.id === bankerId);
        const bankerSettlement = bankerId
          ? finalResults.filter(r => r.id !== bankerId)
              .map(r => ({ name: r.name, amount: r.netBalance }))
              .filter(r => Math.abs(r.amount) > 0.005)
          : [];

        return {
          results: finalResults, totalBuyinChips, totalFinalChips, chipsBalanced,
          totalPokerPnL, totalFoodBalance, totalHouseRuleNet, totalNetBalance,
          banker, bankerSettlement,
        };
      }, [players, hostId, snackProviderId, bankerId, foodCost]);

      const canSettle = players.length >= 2 && players.every(p => p.finalChips !== "") && settlement?.chipsBalanced;

      // ─── Styles ───
      const colors = {
        bg: "#faf8f9", card: "#ffffff", border: "#e8dfe3",
        green: "#6b9e7a", greenBg: "rgba(107,158,122,0.08)",
        red: "#c25d5d", redBg: "rgba(194,93,93,0.07)",
        gold: "#a07040", goldBg: "rgba(160,112,64,0.08)",
        text: "#2d2832", textDim: "#6b5f72", textMuted: "#a89aae",
        blue: "#7e85b2", blueBg: "rgba(126,133,178,0.08)",
        accent: "#c4899a", accentBg: "rgba(196,137,154,0.10)",
      };

      const cardStyle = {
        background: colors.card, border: `1px solid ${colors.border}`,
        borderRadius: 12, padding: 16, boxShadow: "0 1px 3px rgba(0,0,0,0.04)",
      };

      const btnBase = {
        border: "none", borderRadius: 8, cursor: "pointer",
        fontWeight: 600, fontSize: 14, padding: "8px 16px", transition: "all 0.15s",
      };

      const btnPrimary = { ...btnBase, background: colors.accent, color: "#fff" };
      const btnDanger = { ...btnBase, background: "transparent", color: colors.red, border: `1px solid ${colors.red}` };
      const btnSmall = { ...btnBase, padding: "4px 10px", fontSize: 13 };

      const inputStyle = {
        background: "#ffffff", border: `1px solid ${colors.border}`, borderRadius: 8,
        color: colors.text, padding: "10px 12px", fontSize: 15, outline: "none",
        width: "100%", boxSizing: "border-box",
      };

      const badge = (bg, color) => ({
        display: "inline-block", fontSize: 11, fontWeight: 700, padding: "2px 8px",
        borderRadius: 20, background: bg, color, letterSpacing: 0.5, textTransform: "uppercase",
      });

      const toggleStyle = (active) => ({
        ...btnSmall, padding: "5px 14px", fontSize: 13, borderRadius: 20, fontWeight: 700,
        background: active ? colors.greenBg : colors.bg,
        color: active ? colors.green : colors.textMuted,
        border: `1.5px solid ${active ? colors.green : colors.border}`,
        cursor: "pointer", minWidth: 52, transition: "all 0.15s",
      });

      const syncDot = { width: 8, height: 8, borderRadius: "50%", display: "inline-block", marginRight: 6 };
      const syncColors = { synced: "#6b9e7a", saving: "#a07040", connecting: "#7e85b2", error: "#c25d5d", offline: "#a89aae" };
      const syncLabels = { synced: "Synced", saving: "Saving…", connecting: "Connecting…", error: "Sync error", offline: "Local only" };

      if (!loaded) {
        return (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", fontFamily: "'JetBrains Mono', monospace", color: colors.textMuted }}>
            Loading…
          </div>
        );
      }

      return (
        <div style={{ fontFamily: "'JetBrains Mono', monospace", background: colors.bg, color: colors.text, minHeight: "100vh", padding: 0 }}>
          {/* Header */}
          <div style={{
            background: "linear-gradient(135deg, #ffffff 0%, #faf5f7 100%)",
            borderBottom: `1px solid ${colors.border}`, padding: "20px 20px 0",
            position: "sticky", top: 0, zIndex: 10,
          }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
              <div>
                <h1 style={{
                  margin: 0, fontSize: 22, fontWeight: 800, letterSpacing: -0.5,
                  background: `linear-gradient(135deg, ${colors.accent}, ${colors.gold})`,
                  WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
                }}>♠ Poker Night</h1>
                <div style={{ fontSize: 12, color: colors.textMuted, marginTop: 2 }}>
                  $1/$2 NL · ${BUYIN_COST} buy-in · {players.length} playing / {roster.length} in roster
                </div>
              </div>
              {firebaseReady && (
                <div style={{ fontSize: 11, color: syncColors[syncStatus], display: "flex", alignItems: "center" }}>
                  <span style={{ ...syncDot, background: syncColors[syncStatus] }}></span>
                  {syncLabels[syncStatus]}
                </div>
              )}
            </div>
            <div style={{ display: "flex", gap: 0 }}>
              {TABS.map((t, i) => (
                <button key={t} onClick={() => setTab(i)} style={{
                  ...btnBase, background: "transparent",
                  color: tab === i ? colors.accent : colors.textDim, borderRadius: 0,
                  borderBottom: `2px solid ${tab === i ? colors.accent : "transparent"}`,
                  padding: "8px 20px 12px", fontSize: 14,
                }}>{t}</button>
              ))}
            </div>
          </div>

          <div style={{ padding: 20, maxWidth: 600, margin: "0 auto" }}>

            {/* ─── SETUP TAB ─── */}
            {tab === 0 && (
              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                <div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button onClick={newSession} style={{
                      ...btnBase, flex: 1, padding: 12, fontSize: 14,
                      background: colors.accentBg, color: colors.accent, border: `1px solid ${colors.accent}`,
                    }}>🔄 New Session</button>
                    <button onClick={() => setShowConfirmReset(true)} style={{
                      ...btnBase, padding: "12px 16px", fontSize: 14,
                      background: colors.redBg, color: colors.red, border: "1px solid transparent",
                    }}>🗑 Full Reset</button>
                  </div>
                  <div style={{ fontSize: 11, color: colors.textMuted, marginTop: 6, lineHeight: 1.5 }}>
                    New Session keeps roster & toggles, clears game data · Full Reset sets everyone to Out
                  </div>
                </div>

                <div style={cardStyle}>
                  <div style={{ fontSize: 13, color: colors.textDim, marginBottom: 8, fontWeight: 600 }}>ADD TO ROSTER</div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <input style={inputStyle} placeholder="Player name" value={newName}
                      onChange={(e) => setNewName(e.target.value)}
                      onKeyDown={(e) => e.key === "Enter" && addPlayer()} />
                    <button onClick={addPlayer} style={{ ...btnPrimary, whiteSpace: "nowrap" }}>Add</button>
                  </div>
                  <div style={{ fontSize: 11, color: colors.textMuted, marginTop: 6 }}>
                    New players are saved permanently. Tap a name to rename.
                  </div>
                </div>

                <div style={cardStyle}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                    <div style={{ fontSize: 13, color: colors.textDim, fontWeight: 600 }}>PLAYER ROSTER ({roster.length})</div>
                    <div style={{ fontSize: 12, color: colors.accent, fontWeight: 600 }}>{players.length} playing</div>
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    {roster.map(p => (
                      <div key={p.id} style={{
                        display: "flex", alignItems: "center", justifyContent: "space-between",
                        padding: "8px 12px", background: p.playing ? colors.card : colors.bg,
                        borderRadius: 8, gap: 8, opacity: p.playing ? 1 : 0.55,
                        border: `1px solid ${p.playing ? colors.border : "transparent"}`,
                        transition: "all 0.15s",
                      }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, flex: 1, minWidth: 0 }}>
                          {editingName === p.id ? (
                            <input style={{ ...inputStyle, padding: "4px 8px", fontSize: 14, width: "auto", flex: 1 }}
                              value={editValue} onChange={(e) => setEditValue(e.target.value)}
                              onBlur={() => saveEditName(p.id)}
                              onKeyDown={(e) => e.key === "Enter" && saveEditName(p.id)}
                              autoFocus />
                          ) : (
                            <div style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer" }}
                              onClick={() => startEditName(p)} title="Click to rename">
                              <span style={{ fontWeight: 600, fontSize: 15 }}>{p.name}</span>
                              <span style={{ fontSize: 12, color: colors.textMuted, lineHeight: 1 }}>✎</span>
                            </div>
                          )}
                          <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                            {hostId === p.id && <span style={badge(colors.blueBg, colors.blue)}>Host</span>}
                            {snackProviderId === p.id && <span style={badge(colors.goldBg, colors.gold)}>Snacks</span>}
                            {bankerId === p.id && <span style={badge(colors.greenBg, colors.green)}>Banker</span>}
                          </div>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <button onClick={() => togglePlaying(p.id)}
                            style={toggleStyle(p.playing)}
                            title={p.id === RISHABH_ID ? "Rishabh always plays" : (p.playing ? "Sit out" : "Join game")}
                            disabled={p.id === RISHABH_ID}>
                            {p.playing ? "In" : "Out"}
                          </button>
                          {p.id !== RISHABH_ID && (
                            <button onClick={() => removeFromRoster(p.id)}
                              style={{ ...btnSmall, color: colors.textMuted, background: "transparent", padding: "4px 6px", fontSize: 12, opacity: 0.5 }}
                              title={`Remove ${p.name} from roster permanently`}>✕</button>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                {players.length >= 2 && (
                  <div style={cardStyle}>
                    <div style={{ fontSize: 13, color: colors.textDim, marginBottom: 12, fontWeight: 600 }}>ASSIGN ROLES</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                      {[
                        { label: "Host", sublabel: "Exempt from food costs", value: hostId, setter: setHostId },
                        { label: "Snack Provider", sublabel: "Gets reimbursed for food", value: snackProviderId, setter: setSnackProviderId },
                      ].map(({ label, sublabel, value, setter }) => (
                        <div key={label}>
                          <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 4 }}>{label}</div>
                          <div style={{ fontSize: 12, color: colors.textMuted, marginBottom: 6 }}>{sublabel}</div>
                          <select style={{ ...inputStyle, cursor: "pointer" }} value={value || ""}
                            onChange={(e) => setter(e.target.value || null)}>
                            <option value="">— Select —</option>
                            {players.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                          </select>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {players.length >= 2 && hostId && (
                  <button onClick={() => setTab(1)} style={{ ...btnPrimary, padding: 12, fontSize: 16, width: "100%" }}>
                    Start Game →
                  </button>
                )}
              </div>
            )}

            {/* ─── BUY-INS TAB ─── */}
            {tab === 1 && (
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                <div style={{ ...cardStyle, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div style={{ fontSize: 13, color: colors.textDim, fontWeight: 600 }}>TOTAL IN PLAY</div>
                    <div style={{ fontSize: 24, fontWeight: 800, color: colors.accent, marginTop: 4 }}>
                      ${players.reduce((s, p) => s + p.buyins * BUYIN_COST, 0)}
                    </div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 13, color: colors.textDim }}>{players.reduce((s, p) => s + p.buyins, 0)} buy-ins</div>
                    <div style={{ fontSize: 13, color: colors.textDim }}>${players.reduce((s, p) => s + p.buyins * CHIP_VALUE, 0)} in chips</div>
                  </div>
                </div>

                {players.map(p => (
                  <div key={p.id} style={{ ...cardStyle, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <div>
                      <div style={{ fontWeight: 700, fontSize: 15 }}>
                        {p.name}
                        {hostId === p.id && <span style={{ ...badge(colors.blueBg, colors.blue), marginLeft: 6 }}>H</span>}
                      </div>
                      <div style={{ fontSize: 12, color: colors.textMuted, marginTop: 2 }}>
                        ${p.buyins * BUYIN_COST} invested · ${p.buyins * CHIP_VALUE} chips
                      </div>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <button onClick={() => p.buyins > 1 && updateRoster(p.id, "buyins", p.buyins - 1)}
                        disabled={p.buyins <= 1}
                        style={{ ...btnSmall, background: colors.bg, color: p.buyins <= 1 ? colors.textMuted : colors.text, border: `1px solid ${colors.border}`, width: 36, height: 36, padding: 0, fontSize: 18, borderRadius: "50%", opacity: p.buyins <= 1 ? 0.4 : 1 }}>−</button>
                      <span style={{ fontSize: 20, fontWeight: 800, minWidth: 24, textAlign: "center" }}>{p.buyins}</span>
                      <button onClick={() => updateRoster(p.id, "buyins", p.buyins + 1)}
                        style={{ ...btnSmall, background: colors.accent, color: "#fff", width: 36, height: 36, padding: 0, fontSize: 18, borderRadius: "50%" }}>+</button>
                    </div>
                  </div>
                ))}

                <button onClick={() => setTab(2)} style={{ ...btnPrimary, padding: 12, fontSize: 16, width: "100%" }}>
                  End Game & Settle →
                </button>
              </div>
            )}

            {/* ─── SETTLE TAB ─── */}
            {tab === 2 && (
              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                <div style={cardStyle}>
                  <div style={{ fontSize: 13, color: colors.textDim, marginBottom: 4, fontWeight: 600 }}>FINAL CHIP COUNTS</div>
                  <div style={{ fontSize: 12, color: colors.textMuted, marginBottom: 12 }}>
                    Enter each player's chip total (in chip dollars). Total must equal ${players.reduce((s, p) => s + p.buyins * CHIP_VALUE, 0)}.
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                    {players.map(p => (
                      <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <span style={{ width: 100, fontSize: 14, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.name}</span>
                        <span style={{ color: colors.textMuted, fontSize: 13 }}>$</span>
                        <input type="number" style={{ ...inputStyle, flex: 1, textAlign: "right" }}
                          placeholder="0" value={p.finalChips}
                          onChange={(e) => updateRoster(p.id, "finalChips", e.target.value)}
                          min="0" step="0.25" />
                        <span style={{ fontSize: 12, color: colors.textMuted, minWidth: 60, textAlign: "right" }}>
                          = ${((parseFloat(p.finalChips) || 0) * CHIP_TO_DOLLAR).toFixed(2)}
                        </span>
                      </div>
                    ))}
                  </div>
                  {settlement && (
                    <div style={{
                      marginTop: 12, padding: "10px 12px", borderRadius: 8,
                      background: settlement.chipsBalanced ? colors.greenBg : colors.redBg,
                      display: "flex", justifyContent: "space-between", alignItems: "center",
                    }}>
                      <span style={{ fontSize: 13, color: settlement.chipsBalanced ? colors.green : colors.red }}>
                        {settlement.chipsBalanced ? "✓ Chips balanced" : "✗ Chips don't balance"}
                      </span>
                      <span style={{ fontSize: 13, color: colors.textDim }}>
                        ${settlement.totalFinalChips} / ${settlement.totalBuyinChips}
                      </span>
                    </div>
                  )}
                </div>

                <div style={cardStyle}>
                  <div style={{ fontSize: 13, color: colors.textDim, marginBottom: 4, fontWeight: 600 }}>FOOD COST</div>
                  <div style={{ fontSize: 12, color: colors.textMuted, marginBottom: 8 }}>
                    Split among {players.filter(p => p.id !== hostId).length} players (host exempt)
                    {snackProviderId && ` · ${players.find(p => p.id === snackProviderId)?.name} gets reimbursed`}
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ color: colors.textMuted, fontSize: 16 }}>$</span>
                    <input type="number" style={inputStyle} placeholder="0.00" value={foodCost}
                      onChange={(e) => setFoodCost(e.target.value)} min="0" step="0.01" />
                  </div>
                  {foodCost && parseFloat(foodCost) > 0 && hostId && (
                    <div style={{ fontSize: 12, color: colors.textMuted, marginTop: 6 }}>
                      Each non-host pays: ${(parseFloat(foodCost) / players.filter(p => p.id !== hostId).length).toFixed(0)}
                    </div>
                  )}
                </div>

                <div style={cardStyle}>
                  <div style={{ fontSize: 13, color: colors.textDim, marginBottom: 4, fontWeight: 600 }}>HOUSE RULES BONUSES</div>
                  <div style={{ fontSize: 12, color: colors.textMuted, marginBottom: 12 }}>
                    Straight Flush = ${STRAIGHT_FLUSH_BONUS} · Royal Flush = ${ROYAL_FLUSH_BONUS}
                  </div>
                  {players.map(p => (
                    <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                      <span style={{ width: 100, fontSize: 14, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.name}</span>
                      <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                        <span style={{ fontSize: 11, color: colors.gold }}>SF</span>
                        <button onClick={() => p.straightFlushes > 0 && updateRoster(p.id, "straightFlushes", p.straightFlushes - 1)}
                          style={{ ...btnSmall, background: colors.bg, color: colors.text, border: `1px solid ${colors.border}`, width: 28, height: 28, padding: 0, borderRadius: "50%", opacity: p.straightFlushes === 0 ? 0.3 : 1 }}>−</button>
                        <span style={{ fontSize: 14, fontWeight: 700, minWidth: 16, textAlign: "center" }}>{p.straightFlushes}</span>
                        <button onClick={() => updateRoster(p.id, "straightFlushes", p.straightFlushes + 1)}
                          style={{ ...btnSmall, background: colors.gold, color: "#000", width: 28, height: 28, padding: 0, borderRadius: "50%", fontWeight: 700 }}>+</button>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 4, marginLeft: 8 }}>
                        <span style={{ fontSize: 11, color: colors.gold }}>RF</span>
                        <button onClick={() => p.royalFlushes > 0 && updateRoster(p.id, "royalFlushes", p.royalFlushes - 1)}
                          style={{ ...btnSmall, background: colors.bg, color: colors.text, border: `1px solid ${colors.border}`, width: 28, height: 28, padding: 0, borderRadius: "50%", opacity: p.royalFlushes === 0 ? 0.3 : 1 }}>−</button>
                        <span style={{ fontSize: 14, fontWeight: 700, minWidth: 16, textAlign: "center" }}>{p.royalFlushes}</span>
                        <button onClick={() => updateRoster(p.id, "royalFlushes", p.royalFlushes + 1)}
                          style={{ ...btnSmall, background: colors.gold, color: "#000", width: 28, height: 28, padding: 0, borderRadius: "50%", fontWeight: 700 }}>+</button>
                      </div>
                    </div>
                  ))}
                </div>

                {!settled && (
                  <button onClick={() => canSettle && setSettled(true)} disabled={!canSettle} style={{
                    ...btnPrimary, padding: 14, fontSize: 16, width: "100%",
                    opacity: canSettle ? 1 : 0.4, cursor: canSettle ? "pointer" : "not-allowed",
                  }}>
                    {!settlement?.chipsBalanced ? "Fix chip counts first"
                      : players.some(p => p.finalChips === "") ? "Enter all chip counts"
                      : "Calculate Settlement"}
                  </button>
                )}

                {settled && settlement && (
                  <>
                    <div style={{ ...cardStyle, borderColor: colors.accent }}>
                      <div style={{ fontSize: 13, color: colors.accent, marginBottom: 12, fontWeight: 700 }}>✓ SETTLEMENT SUMMARY</div>
                      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                        <thead>
                          <tr style={{ borderBottom: `1px solid ${colors.border}` }}>
                            <th style={{ textAlign: "left", padding: "6px 4px", color: colors.textDim, fontWeight: 600 }}>Player</th>
                            <th style={{ textAlign: "right", padding: "6px 4px", color: colors.textDim, fontWeight: 600 }}>Poker</th>
                            <th style={{ textAlign: "right", padding: "6px 4px", color: colors.textDim, fontWeight: 600 }}>Food</th>
                            <th style={{ textAlign: "right", padding: "6px 4px", color: colors.textDim, fontWeight: 600 }}>Bonus</th>
                            <th style={{ textAlign: "right", padding: "6px 4px", color: colors.textDim, fontWeight: 700 }}>Net</th>
                          </tr>
                        </thead>
                        <tbody>
                          {settlement.results.sort((a, b) => b.netBalance - a.netBalance).map(r => (
                            <tr key={r.id} style={{ borderBottom: `1px solid ${colors.border}22` }}>
                              <td style={{ padding: "8px 4px", fontWeight: 600 }}>
                                {r.name}
                                {bankerId === r.id && <span style={{ ...badge(colors.greenBg, colors.green), marginLeft: 4, fontSize: 9 }}>B</span>}
                              </td>
                              <td style={{ textAlign: "right", padding: "8px 4px", color: r.pokerPnL >= 0 ? colors.green : colors.red }}>
                                {r.pokerPnL >= 0 ? "+" : ""}${r.pokerPnL.toFixed(0)}
                              </td>
                              <td style={{ textAlign: "right", padding: "8px 4px", color: r.foodBalance >= 0 ? colors.green : colors.textDim }}>
                                {r.foodBalance >= 0 ? "+" : ""}${r.foodBalance.toFixed(0)}
                              </td>
                              <td style={{ textAlign: "right", padding: "8px 4px", color: r.houseRuleNet > 0 ? colors.gold : r.houseRuleNet < 0 ? colors.textDim : colors.textMuted }}>
                                {r.houseRuleNet >= 0 ? "+" : ""}${r.houseRuleNet.toFixed(0)}
                              </td>
                              <td style={{ textAlign: "right", padding: "8px 4px", fontWeight: 800, fontSize: 14, color: r.netBalance >= 0 ? colors.green : colors.red }}>
                                {r.netBalance >= 0 ? "+" : ""}${r.netBalance.toFixed(0)}
                              </td>
                            </tr>
                          ))}
                        </tbody>
                        <tfoot>
                          <tr style={{ borderTop: `2px solid ${colors.border}` }}>
                            <td style={{ padding: "8px 4px", fontWeight: 700, color: colors.textDim }}>Totals</td>
                            <td style={{ textAlign: "right", padding: "8px 4px", color: colors.textMuted }}>${settlement.totalPokerPnL.toFixed(0)}</td>
                            <td style={{ textAlign: "right", padding: "8px 4px", color: colors.textMuted }}>${settlement.totalFoodBalance.toFixed(0)}</td>
                            <td style={{ textAlign: "right", padding: "8px 4px", color: colors.textMuted }}>${settlement.totalHouseRuleNet.toFixed(0)}</td>
                            <td style={{ textAlign: "right", padding: "8px 4px", color: colors.textMuted, fontWeight: 700 }}>${settlement.totalNetBalance.toFixed(0)}</td>
                          </tr>
                        </tfoot>
                      </table>
                    </div>

                    {settlement.bankerSettlement.length > 0 && (
                      <div style={{ ...cardStyle, borderColor: colors.gold }}>
                        <div style={{ fontSize: 13, color: colors.gold, marginBottom: 12, fontWeight: 700 }}>
                          💰 BANKER SETTLEMENT — {settlement.banker?.name}
                        </div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                          {settlement.bankerSettlement.sort((a, b) => a.amount - b.amount).map((s, i) => (
                            <div key={i} style={{
                              display: "flex", justifyContent: "space-between", alignItems: "center",
                              padding: "10px 12px", background: s.amount < 0 ? colors.redBg : colors.greenBg, borderRadius: 8,
                            }}>
                              <span style={{ fontWeight: 600, fontSize: 14 }}>{s.name}</span>
                              <span style={{ fontWeight: 800, fontSize: 15, color: s.amount < 0 ? colors.red : colors.green }}>
                                {s.amount < 0 ? `pays $${Math.abs(s.amount).toFixed(0)} →` : `← gets $${s.amount.toFixed(0)}`}
                              </span>
                            </div>
                          ))}
                        </div>
                        <div style={{ marginTop: 12, padding: "8px 12px", borderRadius: 8, background: colors.bg, fontSize: 12, color: colors.textMuted, textAlign: "center" }}>
                          Banker's own net: {settlement.banker.netBalance >= 0 ? "+" : ""}${settlement.banker.netBalance.toFixed(0)}
                        </div>
                      </div>
                    )}

                    <div style={{ ...cardStyle, background: colors.bg, border: `1px dashed ${colors.border}` }}>
                      <div style={{ fontSize: 11, color: colors.textMuted, fontWeight: 600, marginBottom: 8 }}>VERIFICATION</div>
                      <div style={{ fontSize: 12, color: colors.textMuted, lineHeight: 1.8 }}>
                        Poker P&L sum: ${settlement.totalPokerPnL.toFixed(0)} {Math.abs(settlement.totalPokerPnL) < 0.01 ? "✓" : "✗"}<br />
                        Food balance sum: ${settlement.totalFoodBalance.toFixed(0)} {Math.abs(settlement.totalFoodBalance) < 0.01 ? "✓" : "✗"}<br />
                        House rules sum: ${settlement.totalHouseRuleNet.toFixed(0)} {Math.abs(settlement.totalHouseRuleNet) < 0.01 ? "✓" : "✗"}<br />
                        Overall net sum: ${settlement.totalNetBalance.toFixed(0)} {Math.abs(settlement.totalNetBalance) < 0.01 ? "✓" : "✗"}
                      </div>
                    </div>

                    <button onClick={newSession} style={{ ...btnPrimary, padding: 12, fontSize: 15, width: "100%" }}>
                      New Session (keep roster)
                    </button>
                  </>
                )}
              </div>
            )}
          </div>

          {showConfirmReset && (
            <div style={{
              position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)",
              display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 20,
            }} onClick={() => setShowConfirmReset(false)}>
              <div style={{ ...cardStyle, maxWidth: 360, width: "100%" }} onClick={(e) => e.stopPropagation()}>
                <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 8 }}>Full reset?</div>
                <div style={{ fontSize: 13, color: colors.textDim, marginBottom: 16, lineHeight: 1.6 }}>
                  This will set all players to "Out" (except Rishabh) and clear all game data. Your full roster is preserved — no players are removed.
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => setShowConfirmReset(false)} style={{
                    ...btnBase, flex: 1, background: colors.bg, color: colors.textDim, border: `1px solid ${colors.border}`,
                  }}>Cancel</button>
                  <button onClick={resetAll} style={{ ...btnDanger, flex: 1 }}>Yes, Reset</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── Mount ───
    function App() {
      if (!firebaseReady) return <SetupBanner />;
      return <PokerCalculator />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
